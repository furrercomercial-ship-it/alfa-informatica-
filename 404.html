<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Página não encontrada — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.nf-wrap{max-width:640px;margin:0 auto;padding:70px 24px 60px;text-align:center;}
.nf-code{font-size:100px;font-weight:900;color:var(--primary);opacity:.18;line-height:1;margin-bottom:6px;}
.nf-title{font-size:24px;font-weight:800;margin-bottom:10px;}
.nf-sub{font-size:14px;color:var(--text-secondary);margin-bottom:30px;line-height:1.6;}
.btn-home{display:inline-block;padding:13px 30px;background:var(--primary);color:#fff;font-size:13px;font-weight:700;margin-bottom:56px;}
.nf-rec-title{font-size:18px;font-weight:800;margin-bottom:18px;text-align:left;}
.nf-rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;text-align:left;}
.nf-rec-card{background:var(--bg-card);border:1px solid var(--border-color);overflow:hidden;}
.nf-rec-img{height:120px;background:var(--bg-section);}
.nf-rec-img img{width:100%;height:100%;object-fit:cover;}
.nf-rec-name{padding:10px 12px 4px;font-size:12px;font-weight:600;}
.nf-rec-price{padding:0 12px 12px;font-size:14px;font-weight:800;color:var(--success);}
</style>
<link rel="stylesheet" href="header.css?v=2">
<link rel="stylesheet" href="footer.css?v=3">
<link rel="stylesheet" href="popups.css">
<link rel="stylesheet" href="consent.css">
</head>
<body>
<div id="site-header"></div>

<div class="nf-wrap">
  <div class="nf-code">404</div>
  <h1 class="nf-title" id="nfTitle">Página não encontrada</h1>
  <p class="nf-sub" id="nfSub">O link que você acessou não existe ou foi movido.</p>
  <a href="alfa-replica.html" class="btn-home">Voltar à Home</a>

  <div id="nfRec"></div>
</div>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="site-meta.js"></script>
<script src="consent.js"></script>
<script src="event-manager.js"></script>
<script src="script-engine.js"></script>
<script src="theme-loader.js?v=4"></script>
<script src="site-texts.js"></script>
<script src="header.js"></script>
<script>
function fmt(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

async function load() {
  const { data: pag } = await window.sb.from('paginas_cms').select('*').eq('slug', '404').maybeSingle();
  if (pag) {
    document.getElementById('nfTitle').textContent = pag.titulo || 'Página não encontrada';
    document.getElementById('nfSub').textContent = pag.subtitulo || document.getElementById('nfSub').textContent;
  }
  const { data: destaque } = await window.sb.from('products').select('id,name,price,images').eq('active', true).eq('featured', true).limit(4);
  if (destaque && destaque.length) {
    document.getElementById('nfRec').innerHTML = '<div class="nf-rec-title">Talvez você goste destes produtos</div><div class="nf-rec-grid">' +
      destaque.map(p => `
        <a class="nf-rec-card" href="produto.html?id=${p.id}">
          <div class="nf-rec-img">${(p.images && p.images[0]) ? `<img src="${p.images[0]}" alt="">` : ''}</div>
          <div class="nf-rec-name">${p.name}</div>
          <div class="nf-rec-price">${fmt(p.price)}</div>
        </a>`).join('') + '</div>';
  }
}
load();
</script>
<script src="footer.js?v=3"></script>
</body>
</html>
