<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meus Favoritos — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
  --trans:.22s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:#FFFFFF;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hdr{background:var(--bg-header);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;}
.hdr-left{display:flex;align-items:center;gap:16px;}
.hdr-back{display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:13px;font-weight:600;transition:color .2s;}
.hdr-back:hover{color:#fff;}
.hdr-logo{font-size:16px;font-weight:900;color:var(--text-main);}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-btn{padding:8px 18px;background:rgba(40,120,255,.08);border:1px solid var(--border-color);border-radius:8px;color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.hdr-btn:hover{background:rgba(40,120,255,.16);color:#fff;}
.page{max-width:1300px;margin:0 auto;padding:36px 28px 60px;}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.page-title{font-size:24px;font-weight:800;}
.page-count{font-size:13px;color:var(--text-secondary);margin-top:4px;}
.btn-clear{padding:8px 18px;background:transparent;border:1px solid rgba(255,80,80,.25);border-radius:8px;color:rgba(255,100,100,.7);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-clear:hover{border-color:rgba(255,80,80,.5);color:#ff6b6b;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.prod-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .2s,box-shadow .2s,background .2s,filter .2s;position:relative;}
.prod-card:hover{filter:brightness(1.08);border-color:rgba(37,99,235,.35);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.35);}
.prod-img{height:160px;background:#262626;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;color:#3A3A3A;border-bottom:1px solid rgba(255,255,255,.06);position:relative;}
/* TEMPORÁRIO — imagem de teste em todos os produtos */
.prod-img{background:url('img teste.jpg') center/contain no-repeat #f2f4f7 !important;color:transparent !important;font-size:0 !important;padding:16px !important;box-sizing:border-box !important;}
.fav-remove{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(30,30,30,.8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.fav-remove:hover{background:rgba(220,30,30,.6);}
.fav-remove svg{stroke:#ff6b6b;}
.prod-body{padding:14px;display:flex;flex-direction:column;gap:5px;flex:1;}
.prod-brand{font-size:9.5px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;}
.prod-name{font-size:13px;font-weight:600;color:var(--text-main);line-height:1.4;}
.prod-price{font-size:20px;font-weight:400;color:var(--success);margin-top:auto;padding-top:10px;}
.prod-old{font-size:11px;color:var(--text-secondary);text-decoration:line-through;}
.prod-actions{display:flex;gap:8px;padding:0 14px 14px;}
.btn-buy{flex:1;padding:9px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-buy:hover{background:var(--primary-hover);}
.btn-cart{width:38px;height:38px;background:rgba(40,120,255,.08);border:1px solid var(--border-color);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;}
.btn-cart:hover{background:rgba(40,120,255,.18);border-color:rgba(40,120,255,.4);}
.empty{text-align:center;padding:100px 0;color:var(--text-secondary);}
.empty-icon{font-size:64px;margin-bottom:20px;opacity:.3;}
.empty h2{font-size:20px;font-weight:700;color:var(--text-secondary);margin-bottom:10px;}
.empty p{font-size:14px;margin-bottom:28px;line-height:1.6;}
.btn-home{display:inline-block;padding:12px 28px;background:var(--primary);color:#fff;border-radius:10px;font-size:13px;font-weight:700;}
.theme-toggle{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font-family:inherit;padding:8px 10px;border-radius:8px;transition:background .15s;}
.theme-toggle:hover{background:rgba(128,128,128,.12);}
.theme-toggle-track{width:38px;height:20px;border-radius:10px;background:var(--border-color);position:relative;flex-shrink:0;transition:background .2s;}
.theme-toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.theme-toggle.is-dark .theme-toggle-track{background:var(--primary);}
.theme-toggle.is-dark .theme-toggle-knob{left:20px;}
.theme-toggle-label{font-size:12.5px;font-weight:700;color:var(--text-secondary);white-space:nowrap;}

/* ══ SUPORTE FLUTUANTE ══ */
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;transition:transform .2s,box-shadow .2s;}
.wpp-float:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,0,0,.45);}
.wpp-float svg{width:30px;height:30px;}
@media(max-width:600px){.wpp-float{width:52px;height:52px;bottom:18px;right:18px;}.wpp-float svg{width:26px;height:26px;}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-left">
    <a href="alfa-replica.html" class="hdr-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Continuar comprando
    </a>
  </div>
  <div class="hdr-logo">ALFA INFORMÁTICA</div>
  <div class="hdr-right">
    <button class="theme-toggle" id="themeToggle" onclick="Store.toggleTheme()" type="button">
      <span class="theme-toggle-track"><span class="theme-toggle-knob"></span></span>
      <span class="theme-toggle-label">Modo Claro</span>
    </button>
    <a href="carrinho.html"><button class="hdr-btn">🛒 Carrinho <span id="cartBadge"></span></button></a>
  </div>
</header>

<div class="page">
  <div class="page-head">
    <div>
      <h1 class="page-title">Meus Favoritos</h1>
      <div class="page-count" id="favCount"></div>
    </div>
    <button class="btn-clear" onclick="clearAll()">Limpar tudo</button>
  </div>
  <div id="content"></div>
</div>

<script src="store.js"></script>
<script>
Store.syncThemeUI();

function extractPrice(p) {
  return typeof p.price === 'number' ? p.price : parseFloat((p.price||'0').toString().replace(/[^\d,]/g,'').replace(',','.')) || 0;
}

function render() {
  const favs = Store.getFavorites();
  const count = document.getElementById('favCount');
  const badge = document.getElementById('cartBadge');
  badge.textContent = Store.cartCount() > 0 ? `(${Store.cartCount()})` : '';
  count.textContent = `${favs.length} produto${favs.length !== 1 ? 's' : ''} favoritado${favs.length !== 1 ? 's' : ''}`;

  if (!favs.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">♡</div>
        <h2>Nenhum favorito ainda</h2>
        <p>Explore nossos produtos e salve os que você mais gostou.</p>
        <a href="alfa-replica.html" class="btn-home">Explorar produtos</a>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = `<div class="prod-grid">${favs.map(p => {
    const price = extractPrice(p);
    const old = p.old || p.oldPrice || null;
    return `<div class="prod-card">
      <div class="prod-img">
        ?
        <button class="fav-remove" onclick="removeFav('${p.id}')" title="Remover dos favoritos">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="prod-body">
        <div class="prod-brand">${p.brand || ''}</div>
        <div class="prod-name">${p.name}</div>
        ${old ? `<div class="prod-old">R$ ${(typeof old==='number'?old:parseFloat(old)).toLocaleString('pt-BR')},00</div>` : ''}
        <div class="prod-price">R$ ${price.toLocaleString('pt-BR')},00</div>
      </div>
      <div class="prod-actions">
        <button class="btn-buy" onclick="buyNow('${p.id}')">Comprar</button>
        <button class="btn-cart" onclick="addCart('${p.id}')" title="Adicionar ao carrinho">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.97-1.61L23 6H6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function removeFav(id) {
  const favs = Store.getFavorites();
  const p = favs.find(f => String(f.id) === String(id));
  if (p) Store.toggleFavorite(p);
  render();
}
function addCart(id) {
  const p = Store.getFavorites().find(f => String(f.id) === String(id));
  if (p) { Store.addToCart(p); showToast('Adicionado ao carrinho!'); render(); }
}
function buyNow(id) {
  const p = Store.getFavorites().find(f => String(f.id) === String(id));
  if (p) { Store.addToCart(p); Store.setCheckoutItems([{...p, qty:1, selected:true}]); location.href = 'checkout.html'; }
}
function clearAll() {
  if (confirm('Remover todos os favoritos?')) {
    Store.getFavorites().forEach(p => Store.toggleFavorite(p));
    render();
  }
}
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:28px;right:28px;background:#0d1a2e;border:1px solid rgba(40,120,255,.3);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;animation:fadeIn .25s ease;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

render();
</script>
