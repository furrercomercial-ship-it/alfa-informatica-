<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alfa Informática — Entrar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#030303;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
a{color:inherit;text-decoration:none;}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:32px;}
.logo-wrap img{height:64px;object-fit:contain;}
.logo-name{font-size:20px;font-weight:900;letter-spacing:-.5px;}
.logo-sub{font-size:9px;color:#1E6BFF;letter-spacing:2.5px;text-transform:uppercase;}
.card{width:100%;max-width:440px;background:#0B0B0F;border:1px solid rgba(40,120,255,.2);border-radius:16px;padding:36px 32px;}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:28px;gap:0;}
.tab{flex:1;padding:10px;font-size:12.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab.active{color:#fff;border-bottom-color:#1E6BFF;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.field input{width:100%;background:#030303;border:1px solid rgba(40,120,255,.18);border-radius:10px;padding:12px 16px;font-size:14px;color:#fff;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:rgba(40,120,255,.55);box-shadow:0 0 0 3px rgba(40,120,255,.08);}
.field input::placeholder{color:#2a3a4e;}
.btn-main{width:100%;padding:14px;background:#1E6BFF;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;letter-spacing:.6px;cursor:pointer;margin-top:6px;transition:background .2s,transform .15s;}
.btn-main:hover{background:#2255ff;}
.btn-main:active{transform:scale(.98);}
.msg{padding:10px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px;display:none;}
.msg.error{background:rgba(220,30,30,.12);border:1px solid rgba(220,30,30,.3);color:#ff6b6b;}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#22c55e;}
.links{display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px;}
.link-sm{font-size:12px;color:rgba(255,255,255,.38);cursor:pointer;transition:color .2s;}
.link-sm:hover{color:#1E6BFF;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,.18);font-size:11px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
.back-link{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.35);font-size:12px;margin-top:24px;cursor:pointer;transition:color .2s;}
.back-link:hover{color:#fff;}
.user-info{text-align:center;padding:12px 0 4px;}
.user-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.user-email{font-size:12px;color:rgba(255,255,255,.45);}
.btn-outline{width:100%;padding:12px;background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;transition:border-color .2s,color .2s;}
.btn-outline:hover{border-color:rgba(220,30,30,.5);color:#ff6b6b;}
</style>
</head>
<body>
<div class="logo-wrap">
  <img src="logo.png" alt="Alfa Informática" onerror="this.style.display='none'">
  <div class="logo-name">ALFA INFORMÁTICA</div>
  <div class="logo-sub">Hardware &amp; Periféricos</div>
</div>

<div class="card" id="cardMain">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Entrar</button>
    <button class="tab" onclick="switchTab('register')">Criar Conta</button>
  </div>

  <!-- LOGIN -->
  <div class="tab-panel active" id="panel-login">
    <div class="msg" id="loginMsg"></div>
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-main" onclick="doLogin()">ENTRAR</button>
    <div class="links">
      <span class="link-sm" onclick="switchPanel('forgot')">Esqueci minha senha</span>
      <span class="link-sm" onclick="switchTab('register')">Criar conta →</span>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="tab-panel" id="panel-register">
    <div class="msg" id="registerMsg"></div>
    <div class="field"><label>Nome completo</label><input type="text" id="regName" placeholder="Seu nome"></div>
    <div class="field"><label>E-mail</label><input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="regPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
    <div class="field"><label>Confirmar Senha</label><input type="password" id="regPassConf" placeholder="Repita a senha" autocomplete="new-password"></div>
    <button class="btn-main" onclick="doRegister()">CRIAR CONTA</button>
    <div class="links"><span class="link-sm" onclick="switchTab('login')">← Já tenho conta</span></div>
  </div>

  <!-- FORGOT PASSWORD -->
  <div class="tab-panel" id="panel-forgot">
    <div class="msg" id="forgotMsg"></div>
    <p style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;line-height:1.6;">Informe seu e-mail e enviaremos as instruções para redefinir sua senha.</p>
    <div class="field"><label>E-mail</label><input type="email" id="forgotEmail" placeholder="seu@email.com"></div>
    <button class="btn-main" onclick="doForgot()">ENVIAR INSTRUÇÕES</button>
    <div class="links"><span class="link-sm" onclick="switchPanel('login')">← Voltar ao login</span></div>
  </div>

  <!-- LOGGED IN -->
  <div class="tab-panel" id="panel-logged">
    <div class="user-info">
      <div style="font-size:36px;margin-bottom:12px;">👤</div>
      <div class="user-name" id="loggedName"></div>
      <div class="user-email" id="loggedEmail"></div>
    </div>
    <div class="divider">Ações rápidas</div>
    <a href="favoritos.html"><button class="btn-outline" style="margin-top:0;">♡ Meus Favoritos</button></a>
    <a href="carrinho.html"><button class="btn-outline">🛒 Meu Carrinho</button></a>
    <button class="btn-outline" onclick="doLogout()">Sair da conta</button>
  </div>
</div>

<a href="alfa-replica.html" class="back-link">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  Voltar à loja
</a>

<script src="store.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['login','register'][i] === tab));
  switchPanel(tab);
}
function switchPanel(p) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + p).classList.add('active');
}
function showMsg(id, type, txt) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = txt;
  el.style.display = 'block';
}
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('loginMsg','error','Preencha todos os campos.'); return; }
  const res = Store.mockLogin(email, pass);
  if (!res.ok) { showMsg('loginMsg','error', res.msg); return; }
  showMsg('loginMsg','success','Login realizado! Redirecionando...');
  setTimeout(() => { location.href = document.referrer || 'alfa-replica.html'; }, 1000);
}
function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const conf  = document.getElementById('regPassConf').value;
  if (!name || !email || !pass) { showMsg('registerMsg','error','Preencha todos os campos.'); return; }
  if (pass.length < 6) { showMsg('registerMsg','error','Senha deve ter ao menos 6 caracteres.'); return; }
  if (pass !== conf) { showMsg('registerMsg','error','As senhas não coincidem.'); return; }
  const res = Store.mockRegister(name, email, pass);
  if (!res.ok) { showMsg('registerMsg','error', res.msg); return; }
  showMsg('registerMsg','success','Conta criada! Redirecionando...');
  setTimeout(() => { location.href = 'alfa-replica.html'; }, 1000);
}
function doForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showMsg('forgotMsg','error','Informe o e-mail.'); return; }
  showMsg('forgotMsg','success','Instruções enviadas para ' + email + ' (simulado).');
}
function doLogout() {
  Store.clearUser();
  location.reload();
}
// Check if already logged in
const user = Store.getUser();
if (user) {
  switchPanel('logged');
  document.getElementById('loggedName').textContent = user.name;
  document.getElementById('loggedEmail').textContent = user.email;
  document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
}
// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.tab-panel.active');
  if (!active) return;
  if (active.id === 'panel-login') doLogin();
  else if (active.id === 'panel-register') doRegister();
  else if (active.id === 'panel-forgot') doForgot();
});
</script>
</body>
</html>
