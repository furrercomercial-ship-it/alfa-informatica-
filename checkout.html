<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout — Alfa Informática</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#030303;--card:#0B0B0F;--bord:rgba(40,120,255,.2);--blue:#1E6BFF;--txt2:#8A93A5;--green:#22C55E;}
body{background:var(--bg);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hdr{background:#030303;border-bottom:1px solid rgba(40,120,255,.1);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;position:sticky;top:0;z-index:100;}
.hdr-logo{font-size:16px;font-weight:900;letter-spacing:.02em;}
.hdr-back{display:flex;align-items:center;gap:8px;color:var(--txt2);font-size:13px;font-weight:600;transition:color .2s;}
.hdr-back:hover{color:#fff;}
.hdr-secure{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);}
/* Layout */
.layout{max-width:1080px;margin:0 auto;padding:36px 24px 72px;display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
/* Form card */
.form-card{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:28px 32px;}
.section-head{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:#fff;margin-bottom:22px;}
.section-head svg{color:var(--blue);}
.divider{height:1px;background:rgba(255,255,255,.05);margin:26px 0;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px;}
.field input,
.field select,
.field textarea{width:100%;background:#030303;border:1px solid rgba(40,120,255,.18);border-radius:9px;padding:11px 14px;font-size:13.5px;color:#fff;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.field input:focus,
.field select:focus,
.field textarea:focus{border-color:rgba(40,120,255,.5);box-shadow:0 0 0 3px rgba(40,120,255,.07);}
.field input::placeholder,
.field textarea::placeholder{color:#2a3a4e;}
.field select option{background:#0B0B0F;color:#fff;}
.field textarea{resize:vertical;min-height:76px;line-height:1.55;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
/* Payment */
.pay-list{display:flex;flex-direction:column;gap:9px;}
.pay-opt{background:#030303;border:1px solid rgba(40,120,255,.15);border-radius:10px;cursor:pointer;transition:border-color .2s,background .2s;}
.pay-opt.active{border-color:var(--blue);background:rgba(40,120,255,.04);}
.pay-opt label{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;}
.pay-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.pay-txt .pay-name{font-size:13.5px;font-weight:700;color:#fff;}
.pay-txt .pay-desc{font-size:11px;color:var(--txt2);margin-top:2px;}
.pay-badge{margin-left:auto;font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:4px;flex-shrink:0;}
/* Submit */
.btn-submit{width:100%;padding:16px;background:#22C55E;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;letter-spacing:.3px;cursor:pointer;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:11px;transition:filter .2s,transform .15s;box-shadow:0 8px 28px rgba(34,197,94,.25);}
.btn-submit:hover{filter:brightness(1.08);}
.btn-submit:active{transform:scale(.98);}
/* Summary */
.summary{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:22px;position:sticky;top:80px;}
.sum-head{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.35);margin-bottom:16px;}
.sum-items{display:flex;flex-direction:column;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:16px;margin-bottom:14px;}
.sum-item{display:flex;gap:12px;align-items:flex-start;}
.sum-img{width:46px;height:46px;border-radius:8px;background:#030303;border:1px solid rgba(40,120,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;color:#1a1a2e;flex-shrink:0;}
.sum-name{font-size:12px;font-weight:600;color:#fff;line-height:1.35;margin-bottom:2px;}
.sum-qty{font-size:10.5px;color:var(--txt2);}
.sum-price{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;margin-left:auto;padding-left:8px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);margin-bottom:8px;}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid rgba(255,255,255,.06);padding-top:14px;margin-top:4px;}
.sum-total .lbl{font-size:14px;font-weight:700;color:#fff;}
.sum-total .val{font-size:20px;font-weight:800;color:var(--green);}
/* Empty / Success */
.center-msg{grid-column:1/-1;text-align:center;padding:80px 20px;}
.success-icon{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:32px;}
.center-msg h2{font-size:24px;font-weight:800;margin-bottom:10px;}
.center-msg p{font-size:14px;color:var(--txt2);line-height:1.7;margin-bottom:28px;}
.btn-home{display:inline-block;padding:12px 28px;background:var(--blue);color:#fff;border-radius:10px;font-size:13px;font-weight:700;transition:background .2s;}
.btn-home:hover{background:#2255ff;}
@media(max-width:820px){
  .layout{grid-template-columns:1fr;}
  .summary{position:static;}
  .two-col{grid-template-columns:1fr;}
  .hdr{padding:0 16px;}
}
</style>
</head>
<body>
<header class="hdr">
  <a href="carrinho.html" class="hdr-back">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar ao carrinho
  </a>
  <div class="hdr-logo">ALFA INFORMÁTICA</div>
  <div class="hdr-secure">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Checkout seguro
  </div>
</header>

<div class="layout" id="mainLayout">
  <div id="formArea"></div>
  <div id="summaryArea"></div>
</div>

<script src="store.js"></script>
<script>
var WPP = 'https://wa.me/5565992655883';
var items = [];

function fmt(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function init() {
  items = Store.getCheckoutItems();
  if (!items.length) items = Store.getCart().filter(function(i){ return i.selected; });
  if (!items.length) items = Store.getCart();

  if (!items.length) {
    document.getElementById('mainLayout').innerHTML = '<div class="center-msg"><div style="font-size:56px;margin-bottom:20px;opacity:.25;">🛒</div><h2>Carrinho vazio</h2><p>Adicione produtos ao carrinho antes de finalizar.</p><a href="alfa-replica.html" class="btn-home">Ir para a loja</a></div>';
    return;
  }
  renderForm();
  renderSummary();
}

var payOpts = [
  {id:'pix',    label:'Pix',               desc:'Aprovação imediata',          badge:'5% OFF', bcolor:'rgba(34,197,94,.12)', tcolor:'#22C55E', ibg:'rgba(34,197,94,.12)', ic:'PIX'},
  {id:'cartao', label:'Cartão de crédito', desc:'Visa, Mastercard, Elo',       badge:'Até 12x',bcolor:'rgba(40,120,255,.12)',tcolor:'var(--blue)', ibg:'rgba(40,120,255,.1)', ic:'💳'},
  {id:'debito', label:'Cartão de débito',  desc:'Aprovação imediata',          badge:'',       bcolor:'',                   tcolor:'',          ibg:'rgba(255,255,255,.05)',ic:'🏦'},
  {id:'boleto', label:'Boleto bancário',   desc:'1–3 dias úteis para compensar',badge:'',      bcolor:'',                   tcolor:'',          ibg:'rgba(245,158,11,.08)', ic:'📄'},
];

function renderForm() {
  var payHtml = payOpts.map(function(p, i) {
    return '<div class="pay-opt' + (i===0?' active':'') + '" onclick="selPay(\'' + p.id + '\',this)">' +
      '<label>' +
        '<input type="radio" name="pay" value="' + p.id + '" style="accent-color:var(--blue);width:16px;height:16px;flex-shrink:0;"' + (i===0?' checked':'') + '>' +
        '<div class="pay-icon" style="background:' + p.ibg + ';">' + p.ic + '</div>' +
        '<div class="pay-txt"><div class="pay-name">' + p.label + '</div><div class="pay-desc">' + p.desc + '</div></div>' +
        (p.badge ? '<span class="pay-badge" style="background:' + p.bcolor + ';color:' + p.tcolor + ';">' + p.badge + '</span>' : '') +
      '</label></div>';
  }).join('');

  document.getElementById('formArea').innerHTML =
    '<div class="form-card">' +
      '<div class="section-head"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Dados para contato</div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Nome completo</label><input type="text" id="fNome" placeholder="Seu nome completo" autocomplete="name"></div>' +
        '<div class="field"><label>Telefone / WhatsApp</label><input type="tel" id="fFone" placeholder="(65) 99999-9999" autocomplete="tel"></div>' +
      '</div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Cidade</label><input type="text" id="fCidade" placeholder="Cuiabá" autocomplete="address-level2"></div>' +
        '<div class="field"><label>Estado</label>' +
          '<select id="fEstado" autocomplete="address-level1">' +
            '<option value="">Selecione</option>' +
            '<option>AC</option><option>AL</option><option>AP</option><option>AM</option><option>BA</option>' +
            '<option>CE</option><option>DF</option><option>ES</option><option>GO</option><option>MA</option>' +
            '<option selected>MT</option><option>MS</option><option>MG</option><option>PA</option><option>PB</option>' +
            '<option>PR</option><option>PE</option><option>PI</option><option>RJ</option><option>RN</option>' +
            '<option>RS</option><option>RO</option><option>RR</option><option>SC</option><option>SP</option>' +
            '<option>SE</option><option>TO</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="field"><label>Observações (opcional)</label><textarea id="fObs" placeholder="Alguma informação adicional para o pedido..."></textarea></div>' +
      '<div class="divider"></div>' +
      '<div class="section-head"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Forma de pagamento</div>' +
      '<div class="pay-list">' + payHtml + '</div>' +
      '<button class="btn-submit" onclick="finalize()">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>' +
        'Finalizar Pedido via WhatsApp' +
      '</button>' +
    '</div>';
}

function selPay(id, el) {
  document.querySelectorAll('.pay-opt').forEach(function(o){ o.classList.remove('active'); });
  el.classList.add('active');
  el.querySelector('input[type=radio]').checked = true;
}

function renderSummary() {
  var subtotal = items.reduce(function(s,i){ return s + i.price * i.qty; }, 0);
  var html = '<div class="summary"><div class="sum-head">Seu pedido</div><div class="sum-items">';
  items.forEach(function(i) {
    html += '<div class="sum-item">' +
      '<div class="sum-img">?</div>' +
      '<div style="flex:1;min-width:0;"><div class="sum-name">' + i.name + '</div>' +
      '<div class="sum-qty">' + i.qty + 'x &middot; ' + fmt(i.price) + '</div></div>' +
      '<div class="sum-price">' + fmt(i.price * i.qty) + '</div>' +
    '</div>';
  });
  html += '</div>';
  html += '<div class="sum-row"><span>Subtotal (' + items.length + ' item' + (items.length > 1 ? 's' : '') + ')</span><span>' + fmt(subtotal) + '</span></div>';
  html += '<div class="sum-row"><span>Frete</span><span style="color:#22C55E;">A combinar</span></div>';
  html += '<div class="sum-total"><span class="lbl">Total estimado</span><span class="val">' + fmt(subtotal) + '</span></div>';
  html += '</div>';
  document.getElementById('summaryArea').innerHTML = html;
}

var payLabels = {pix:'Pix (5% OFF)', cartao:'Cartão de crédito', debito:'Cartão de débito', boleto:'Boleto bancário'};

function finalize() {
  var nome   = (document.getElementById('fNome')?.value || '').trim();
  var fone   = (document.getElementById('fFone')?.value || '').trim();
  var cidade = (document.getElementById('fCidade')?.value || '').trim();
  var estado = (document.getElementById('fEstado')?.value || '').trim();
  var obs    = (document.getElementById('fObs')?.value || '').trim();
  var pay    = (document.querySelector('input[name=pay]:checked')?.value) || 'pix';

  if (!nome)   { alert('Por favor, informe seu nome.');    document.getElementById('fNome').focus();   return; }
  if (!fone)   { alert('Por favor, informe seu telefone.');document.getElementById('fFone').focus();   return; }
  if (!cidade) { alert('Por favor, informe sua cidade.');  document.getElementById('fCidade').focus(); return; }
  if (!estado) { alert('Por favor, selecione seu estado.');document.getElementById('fEstado').focus(); return; }

  var subtotal = items.reduce(function(s,i){ return s + i.price * i.qty; }, 0);

  var prodLines = items.map(function(i) {
    return '• ' + i.qty + 'x ' + i.name + ' — ' + fmt(i.price * i.qty);
  }).join('\n');

  var msg = '🛒 *NOVO PEDIDO — ALFA INFORMÁTICA*\n\n'
    + '👤 *Cliente:* ' + nome + '\n'
    + '📱 *Telefone:* ' + fone + '\n'
    + '📍 *Localização:* ' + cidade + ' - ' + estado + '\n\n'
    + '*📦 PRODUTOS:*\n' + prodLines + '\n\n'
    + '*💰 TOTAL: ' + fmt(subtotal) + '*\n'
    + '*💳 Pagamento: ' + (payLabels[pay] || pay) + '*'
    + (obs ? '\n\n*📝 Obs:* ' + obs : '')
    + '\n\n_Pedido realizado via site Alfa Informática_';

  var url = WPP + '?text=' + encodeURIComponent(msg);

  Store.clearCart();
  Store.setCheckoutItems([]);

  window.open(url, '_blank');

  document.getElementById('mainLayout').innerHTML =
    '<div class="center-msg">' +
      '<div class="success-icon">✓</div>' +
      '<h2>Pedido enviado!</h2>' +
      '<p>Sua mensagem foi encaminhada para o WhatsApp da Alfa Informática.<br>Em breve nossa equipe entrará em contato para confirmar.</p>' +
      '<a href="alfa-replica.html" class="btn-home">Continuar comprando</a>' +
    '</div>';
}

init();
</script>
</body>
</html>
