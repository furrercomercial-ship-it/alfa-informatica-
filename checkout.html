<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}
/* Layout */
.layout{max-width:1080px;margin:0 auto;padding:36px 24px 72px;display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
/* Form card */
.form-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:28px 32px;}
.section-head{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:var(--text-main);margin-bottom:22px;text-transform:uppercase;letter-spacing:.04em;}
.section-head svg{color:var(--primary);}
.section-head.faded{color:var(--text-muted);}
.section-ico-badge{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-ico-badge svg{width:16px;height:16px;color:#fff;}
.section-ico-badge.faded{background:var(--border-color);color:var(--text-muted);}
.section-ico-badge.faded svg{color:var(--text-muted);}
.divider{height:1px;background:var(--border-color);margin:26px 0;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:800;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px;}
.field input,
.field select,
.field textarea{width:100%;background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:11px 14px;font-size:13.5px;color:var(--text-main);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.field input:focus,
.field select:focus,
.field textarea:focus{border-color:rgba(37,99,235,.5);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.field input::placeholder,
.field textarea::placeholder{color:var(--text-muted);}
.field select option{background:var(--bg-card);color:var(--text-main);}
.field textarea{resize:vertical;min-height:76px;line-height:1.55;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
/* Payment */
.pay-list{display:flex;flex-direction:column;gap:9px;}
.pay-opt{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;cursor:pointer;transition:border-color .2s,background .2s;}
.pay-opt.active{border-color:var(--primary);background:rgba(37,99,235,.06);}
.pay-opt label{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;}
.pay-icon{width:36px;height:36px;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.pay-txt .pay-name{font-size:13.5px;font-weight:700;color:var(--text-main);}
.pay-txt .pay-desc{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.pay-badge{margin-left:auto;font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:0;flex-shrink:0;}
/* Cartão (Mercado Pago Secure Fields) */
.mp-card-form{margin-top:14px;padding-top:14px;border-top:1px solid var(--border-color);}
.mp-secure-field{width:100%;height:42px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:0 14px;}
.mp-secure-field.focused{border-color:rgba(37,99,235,.5);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.mp-card-msg{font-size:11.5px;margin-top:8px;}
.mp-card-msg.error{color:#e5484d;}
.mp-card-msg.ok{color:var(--success);}
.pix-box{margin-top:14px;padding:18px;background:var(--bg-main);border:1px dashed var(--border-color);text-align:center;}
.pix-box img{max-width:200px;margin:0 auto 12px;}
.pix-copy{display:flex;gap:8px;margin-top:10px;}
.pix-copy input{flex:1;min-width:0;font-size:11px;padding:9px 10px;background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);}
/* Submit */
.btn-submit{width:100%;padding:16px;background:var(--alfa-btn-buy-bg,var(--success));color:var(--alfa-btn-buy-text,#fff);border:none;border-radius:0;font-size:14px;font-weight:800;letter-spacing:.3px;cursor:pointer;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:11px;transition:filter .2s,transform .15s;box-shadow:0 8px 28px rgba(34,197,94,.25);}
.btn-submit:hover{filter:brightness(1.08);}
.btn-submit:active{transform:scale(.98);}
/* Summary */
.summary{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:22px;position:sticky;top:80px;}
.sum-head{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--text-muted);margin-bottom:16px;}
.sum-items{display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border-color);padding-bottom:16px;margin-bottom:14px;}
.sum-item{display:flex;gap:12px;align-items:flex-start;}
.sum-img{width:46px;height:46px;border-radius:0;background:var(--bg-card);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:18px;color:#1a1a2e;flex-shrink:0;}
.sum-name{font-size:12px;font-weight:600;color:var(--text-main);line-height:1.35;margin-bottom:2px;}
.sum-qty{font-size:10.5px;color:var(--text-secondary);}
.sum-price{font-size:13px;font-weight:700;color:var(--text-main);white-space:nowrap;margin-left:auto;padding-left:8px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:8px;}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--border-color);padding-top:14px;margin-top:4px;}
.sum-total .lbl{font-size:14px;font-weight:700;color:var(--text-main);}
.sum-total .val{font-size:20px;font-weight:800;color:var(--alfa-price-pix,var(--success));}
.sum-cupom{margin-bottom:14px;}
.sum-cupom-row{display:flex;gap:8px;}
.sum-cupom-row input{flex:1;min-width:0;padding:10px 12px;border:1px solid var(--border-color);background:var(--bg-main);color:var(--text-main);font-size:12.5px;border-radius:0;}
.sum-cupom-row .btn-secondary{padding:0 16px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid var(--border-color);background:transparent;color:var(--text-main);cursor:pointer;}
.sum-cupom-row .btn-secondary:disabled{opacity:.5;cursor:default;}
.sum-cupom-applied{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);font-size:12.5px;color:var(--text-main);}
.sum-cupom-applied span{display:flex;align-items:center;gap:7px;}
.sum-cupom-applied svg{width:14px;height:14px;color:var(--success);flex-shrink:0;}
.sum-cupom-applied button{background:none;border:none;color:var(--text-secondary);font-size:11.5px;text-decoration:underline;cursor:pointer;}
.sum-cupom-erro{font-size:11.5px;color:#e5484d;margin-top:6px;}
/* Empty / Success */
.center-msg{grid-column:1/-1;text-align:center;padding:80px 20px;}
.success-icon{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:32px;}
.center-msg h2{font-size:24px;font-weight:800;margin-bottom:10px;}
.center-msg p{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;}
.btn-home{display:inline-block;padding:12px 28px;background:var(--primary);color:#fff;border-radius:0;font-size:13px;font-weight:700;transition:background .2s;}
.btn-home:hover{background:var(--primary-hover);}

/* ── CHECKOUT STEPS ── */
.ck-card{margin-bottom:18px;}
.ck-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.ck-check{width:22px;height:22px;border-radius:50%;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ck-check svg{width:12px;height:12px;}
.ck-locked{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:44px 20px;background:var(--bg-main);border:1px dashed var(--border-color);border-radius:0;color:var(--text-muted);text-align:center;font-size:13px;}
.ck-locked svg{width:30px;height:30px;opacity:.55;}
.ck-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:44px 20px;text-align:center;}
.ck-empty svg{width:34px;height:34px;color:var(--text-muted);}
.ck-empty p{font-size:13.5px;color:var(--text-secondary);}
.ck-addr-card{display:flex;align-items:flex-start;gap:12px;padding:16px;border:1px solid var(--border-color);border-radius:0;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:10px;}
.ck-addr-card.sel{border-color:var(--primary);background:rgba(0,102,255,.05);}
.ck-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-color);flex-shrink:0;margin-top:1px;position:relative;transition:border-color .2s;}
.sel .ck-radio,.ck-addr-card.sel .ck-radio{border-color:var(--primary);}
.sel .ck-radio::after,.ck-addr-card.sel .ck-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--primary);}
.ck-addr-txt{font-size:13px;color:var(--text-main);line-height:1.55;flex:1;}
.ck-addr-txt b{display:block;font-size:13.5px;margin-bottom:2px;}
.ck-addr-txt span{color:var(--text-secondary);}
.btn-link{background:none;border:none;color:var(--primary);font-size:12.5px;font-weight:700;cursor:pointer;padding:0;font-family:inherit;}
.btn-link:hover{color:var(--primary-hover);}
.ship-opt{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--border-color);border-radius:0;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:10px;}
.ship-opt.sel{border-color:var(--primary);background:rgba(0,102,255,.05);}
.ship-info{flex:1;}
.ship-name{font-size:13.5px;font-weight:700;color:var(--text-main);}
.ship-days{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.ship-price{font-size:14px;font-weight:800;color:var(--success);white-space:nowrap;}
.ck-alert{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.28);border-radius:0;padding:14px 16px;margin-bottom:16px;}
.ck-alert-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:#DC2626;margin-bottom:8px;}
.ck-alert ul{margin:0;padding-left:18px;}
.ck-alert li{font-size:12px;color:var(--text-secondary);margin-bottom:3px;}
.ck-terms{display:flex;align-items:flex-start;gap:10px;margin:16px 0 4px;cursor:pointer;}
.ck-terms input{margin-top:2px;width:16px;height:16px;accent-color:var(--primary);flex-shrink:0;cursor:pointer;}
.ck-terms span{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.ck-terms a{color:var(--primary);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;filter:none!important;transform:none!important;}
.addr-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.contact-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-color);font-size:13px;}
.contact-row:last-child{border-bottom:none;}
.contact-row span:first-child{color:var(--text-muted);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.1em;}
.contact-row span:last-child{color:var(--text-main);font-weight:600;}
@media(max-width:820px){
  .layout{grid-template-columns:1fr;}
  .summary{position:static;}
  .two-col{grid-template-columns:1fr;}
  .addr-form-grid{grid-template-columns:1fr;}
}

/* ══ SUPORTE FLUTUANTE ══ */
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;transition:transform .2s,box-shadow .2s;}
.wpp-float:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,0,0,.45);}
.wpp-float svg{width:30px;height:30px;}
@media(max-width:600px){.wpp-float{width:52px;height:52px;bottom:18px;right:18px;}.wpp-float svg{width:26px;height:26px;}}
</style>

<body>
<div id="site-header"></div>

<div class="layout" id="mainLayout">
  <div id="formArea"></div>
  <div id="summaryArea"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="https://sdk.mercadopago.com/js/v2"></script>
<script src="mercadopago-client.js"></script>
<script src="site-meta.js"></script>
<script src="consent.js"></script>
<script src="event-manager.js"></script>
<script src="script-engine.js"></script>
<script src="popups.js"></script>
<script src="theme-loader.js?v=5"></script>
<script src="site-texts.js"></script>

<script src="products.js"></script>
<script src="categories.js"></script>
<script src="header.js"></script>
<script>
var WPP = 'https://wa.me/5565992655883';
var items = [];

var state = { addressId:null, addingAddress:false, shipId:null, payId:null, terms:false, cupom:null, cupomErro:'', cupomChecking:false, guestEmail:'', guestCpf:'', paying:false };

var shipOpts = [
  {id:'economico', name:'Econômico',       price:18.90, days:'7–10 dias úteis'},
  {id:'expresso',  name:'Expresso',        price:34.90, days:'3–5 dias úteis'},
  {id:'retirada',  name:'Retirada na loja',price:0,     days:'Disponível a partir de 1h'}
];

// Só os 2 métodos que realmente funcionam de verdade via Mercado Pago
// (Checkout Transparente / API de Orders, ambiente de TESTE). Os outros 3
// que existiam aqui (cartão+pix, dois cartões, boleto) nunca processaram
// pagamento nenhum — eram só botões decorativos.
var payOpts = [
  {id:'pix',          label:'Pix',               desc:'Aprovação imediata — 5% de desconto', badge:'5% OFF',
    icon:'<circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/>'},
  {id:'credit_card',  label:'Cartão de crédito', desc:'Visa, Mastercard, Elo — em até 12x',   badge:'Até 12x',
    icon:'<rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>'}
];

var mpCardFormCtl = null; // controlador do cardForm do Mercado Pago, montado só quando "Cartão" é selecionado
var checkoutIdempotencyKey = null;

function fmt(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function maskCPF(cpf) {
  if (!cpf) return '—';
  var d = cpf.replace(/\D/g,'');
  if (d.length !== 11) return cpf;
  return '***.***.' + d.slice(6,9) + '-**';
}

function init() {
  items = Store.getCheckoutItems();
  if (!items.length) items = Store.getCart().filter(function(i){ return i.selected; });
  if (!items.length) items = Store.getCart();

  if (!items.length) {
    document.getElementById('mainLayout').innerHTML = '<div class="center-msg"><div style="font-size:56px;margin-bottom:20px;opacity:.25;">🛒</div><h2>Carrinho vazio</h2><p>Adicione produtos ao carrinho antes de finalizar.</p><a href="alfa-replica.html" class="btn-home">Ir para a loja</a></div>';
    return;
  }
  var addrs0 = Store.getAddresses();
  if (addrs0.length && !state.addressId) state.addressId = addrs0[0].id;
  renderAll();
  if (window.AlfaEvents) {
    window.AlfaEvents.track('begin_checkout', {
      value: items.reduce(function(s,i){ return s + i.price*i.qty; }, 0),
      items: items.map(function(i){ return { id: i.id, name: i.name, price: i.price, qty: i.qty }; }),
    });
  }
}

function checkIco(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }

function cupomDiscountValue(cupom, subtotal) {
  if (!cupom) return 0;
  var d = cupom.tipo === 'percentual' ? subtotal * (cupom.valor / 100) : cupom.valor;
  return Math.min(d, subtotal);
}

async function applyCupom() {
  var input = document.getElementById('cupomInput');
  var codigo = (input.value || '').trim().toUpperCase();
  if (!codigo) return;
  state.cupomChecking = true; state.cupomErro = '';
  renderAll();

  var subtotal = items.reduce(function(s,i){ return s + i.price * i.qty; }, 0);
  var { data, error } = await window.sb.from('cupons').select('*').eq('codigo', codigo).eq('ativo', true).maybeSingle();
  state.cupomChecking = false;

  if (error || !data) { state.cupom = null; state.cupomErro = 'Cupom inválido ou inativo.'; renderAll(); return; }
  var now = new Date();
  if (data.validade_inicio && new Date(data.validade_inicio) > now) { state.cupom = null; state.cupomErro = 'Este cupom ainda não está válido.'; renderAll(); return; }
  if (data.validade_fim && new Date(data.validade_fim) < now) { state.cupom = null; state.cupomErro = 'Este cupom expirou.'; renderAll(); return; }
  if (data.limite_uso && data.usos >= data.limite_uso) { state.cupom = null; state.cupomErro = 'Este cupom já atingiu o limite de uso.'; renderAll(); return; }
  if (data.valor_minimo && subtotal < data.valor_minimo) { state.cupom = null; state.cupomErro = 'Pedido mínimo de ' + fmt(data.valor_minimo) + ' para usar este cupom.'; renderAll(); return; }

  state.cupom = data;
  state.cupomErro = '';
  renderAll();
  if (window.AlfaEvents) window.AlfaEvents.track('cupom_usado', { coupon: data.codigo, value: cupomDiscountValue(data, subtotal) });
}

function removeCupom() { state.cupom = null; state.cupomErro = ''; renderAll(); }

function renderAll(){
  // Se o formulário de cartão do Mercado Pago já existir, tira ele de
  // dentro do formArea ANTES de reescrever o innerHTML — senão essa
  // reescrita destrói os iframes vivos que estão lá dentro. Fica
  // "estacionado", escondido, direto no body, e só volta pro lugar certo
  // no fim desta função (mountCardPaymentForm), se ainda for a vez dele.
  var parkedCardForm = document.getElementById('mpCardFormPersistent');
  if (parkedCardForm) { parkedCardForm.style.display = 'none'; document.body.appendChild(parkedCardForm); }

  var user = Store.getUser() || {};
  var addrs = Store.getAddresses();
  var ship = shipOpts.find(function(s){ return s.id === state.shipId; });

  var contatoHtml = '<div class="form-card ck-card" data-block="contato">' +
    '<div class="ck-head-row"><div class="section-head" style="margin:0;"><div class="section-ico-badge"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span data-text="checkout_contato">Contato</span></div><div class="ck-check">' + checkIco() + '</div></div>' +
    (user.email ?
      '<div class="contact-row"><span>Nome</span><span>' + (user.name||'—') + '</span></div>' +
      '<div class="contact-row"><span>E-mail</span><span>' + user.email + '</span></div>' +
      '<div class="contact-row"><span>CPF</span><span>' + maskCPF(user.cpf) + '</span></div>'
      : '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">Você não está logado. <a href="auth.html" style="color:var(--primary);">Entre na sua conta</a> ou preencha os dados abaixo — exigidos pelo Mercado Pago pra processar o pagamento.</p>' +
        '<div class="two-col">' +
          '<div class="field"><label>E-mail</label><input type="email" id="guestEmail" placeholder="voce@email.com" value="' + state.guestEmail + '" onblur="updateContactField(\'guestEmail\',this.value)"></div>' +
          '<div class="field"><label>CPF</label><input id="guestCpf" placeholder="000.000.000-00" maxlength="14" value="' + state.guestCpf + '" onblur="updateContactField(\'guestCpf\',this.value)"></div>' +
        '</div>') +
    '</div>';

  var addrBody;
  if (state.addingAddress) {
    addrBody =
      '<div class="two-col"><div class="field"><label>CEP</label><input id="aCep" placeholder="00000-000" maxlength="9"></div><div class="field"><label>Cidade</label><input id="aCidade" placeholder="Cuiabá"></div></div>' +

// Se o formulário de cartão já estiver aberto, não chama renderAll() — teria
// o mesmo problema de destruir o iframe do Mercado Pago no meio do preenchimento.
// O valor digitado já fica salvo em state; só não atualiza o aviso de "faltando"
// até o próximo re-render natural (trocar frete, endereço etc.).
function updateContactField(field, value) {
  state[field] = value;
  if (state.payId !== 'credit_card') renderAll();
}

function selectAddress(id){ if (state.addressId === id) return; state.addressId = id; renderAll(); }

function saveAddress(){
  var cep = (document.getElementById('aCep').value||'').trim();
  var rua = (document.getElementById('aRua').value||'').trim();
  var numero = (document.getElementById('aNumero').value||'').trim();
  var compl = (document.getElementById('aCompl').value||'').trim();
  var bairro = (document.getElementById('aBairro').value||'').trim();
  var cidade = (document.getElementById('aCidade').value||'').trim();
  var uf = (document.getElementById('aUf').value||'').trim();
  var dest = (document.getElementById('aDest').value||'').trim();
  var tel = (document.getElementById('aTel').value||'').trim();
  if (!cep||!rua||!numero||!bairro||!cidade||!uf||!dest||!tel){ alert('Preencha todos os campos do endereço (complemento é opcional).'); return; }
  Store.addAddress({cep:cep,rua:rua,numero:numero,compl:compl,bairro:bairro,cid:cidade,uf:uf,dest:dest,tel:tel});
  var addrs2 = Store.getAddresses();
  state.addressId = addrs2[addrs2.length-1].id;
  state.addingAddress = false;
  renderAll();
}

function selectShip(id){
  if (state.shipId === id) return; // clicar de novo na mesma opção não deve redesenhar nada
  state.shipId = id; renderAll();
  var ship = shipOpts.find(function(s){ return s.id === id; });
  if (window.AlfaEvents && ship) window.AlfaEvents.track('add_shipping_info', { shipping_tier: ship.name, value: ship.price });
}
function selectPay(id){
  // Clicar de novo na opção já selecionada não pode remontar o formulário
  // do Mercado Pago — ele não sobrevive a ser montado duas vezes (o SDK só
  // devolve a instância antiga, mas os campos na tela já foram trocados
  // por elementos novos que o Mercado Pago não está mais escutando).
  if (state.payId === id) return;
  // Não zera mpCardFormCtl aqui: se a pessoa trocar de método e voltar pra
  // "Cartão de crédito" depois, o mesmo formulário (com o que ela já tinha
  // digitado) é reaproveitado — nunca recriado — então a referência dele
  // precisa continuar valendo a viagem inteira.
  state.payId = id; renderAll();
  var pay = payOpts.find(function(p){ return p.id === id; });
  if (window.AlfaEvents && pay) window.AlfaEvents.track('add_payment_info', { method: pay.label });
}

// Monta o formulário oficial de cartão do Mercado Pago (Secure Fields) — o
// número/validade/CVV nunca passam pelo nosso JS, só pelos iframes deles.
// O SDK do Mercado Pago NÃO suporta ser montado duas vezes na mesma sessão
// (na segunda vez ele só devolve a instância antiga, sem religar nos
// campos novos que o renderAll() acabou de recriar na tela) — por isso,
// mesmo com as travas em selectPay/selectShip/selectAddress evitando
// re-render à toa, esta função também se recusa a montar de novo enquanto
// já existir uma montagem ativa. mpCardFormCtl só volta a `null` quando o
// método de pagamento muda de verdade (ver selectPay).
// O formulário de cartão (com os iframes do Mercado Pago dentro) é criado
// UMA única vez por visita à página e só é REPOSICIONADO nos redesenhos
// seguintes (via replaceWith, que move o nó existente sem destruí-lo) —
// nunca recriado. renderAll() roda de novo por qualquer motivo (endereço,
// cupom, termos, frete...), e se o formulário fosse reconstruído do zero a
// cada vez, o Mercado Pago perderia a referência dos campos (o SDK não
// suporta ser montado duas vezes na mesma sessão).
function mountCardPaymentForm(amount) {
  if (!window.MPClient) return;
  var anchor = document.getElementById('mpCardFormAnchor');
  if (!anchor) return;

  var persistent = document.getElementById('mpCardFormPersistent');
  if (persistent) { persistent.style.display = ''; anchor.replaceWith(persistent); return; }

  persistent = document.createElement('div');
  persistent.className = 'mp-card-form';
  persistent.id = 'mpCardFormPersistent';
  persistent.innerHTML =
    '<form id="mpCardForm">' +
      '<div class="two-col">' +
        '<div class="field"><label>Número do cartão</label><div id="mpCardNumber" class="mp-secure-field"></div></div>' +
        '<div class="field"><label>Nome impresso no cartão</label><input id="mpCardholderName" placeholder="Como está no cartão"></div>' +
      '</div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Validade</label><div id="mpExpirationDate" class="mp-secure-field"></div></div>' +
        '<div class="field"><label>CVV</label><div id="mpSecurityCode" class="mp-secure-field"></div></div>' +
      '</div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Parcelas</label><select id="mpInstallments"></select></div>' +
        '<div class="field"><label>Banco emissor</label><select id="mpIssuer"></select></div>' +
      '</div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Tipo de documento</label><select id="mpIdentificationType"></select></div>' +
        '<div class="field"><label>Número do documento</label><input id="mpIdentificationNumber"></div>' +
      '</div>' +
      '<input type="hidden" id="mpCardholderEmail">' +
    '</form>' +
    '<div class="mp-card-msg" id="mpCardMsg"></div>';

  anchor.replaceWith(persistent);

  var msgEl = document.getElementById('mpCardMsg');
  mpCardFormCtl = MPClient.mountCardForm({
    formId: 'mpCardForm',
    cardNumber: 'mpCardNumber',
    expirationDate: 'mpExpirationDate',
    securityCode: 'mpSecurityCode',
    cardholderName: 'mpCardholderName',
    issuer: 'mpIssuer',
    installments: 'mpInstallments',
    identificationType: 'mpIdentificationType',
    identificationNumber: 'mpIdentificationNumber',
    cardholderEmail: 'mpCardholderEmail',
  }, amount, function () {
    if (msgEl) msgEl.textContent = '';
    var user = Store.getUser() || {};
    var email = user.email || state.guestEmail || '';
    var cpf = (user.cpf || state.guestCpf || '').replace(/\D/g, '');

    // Só setar `.value` direto não avisa o SDK do Mercado Pago (ele escuta
    // eventos input/change pra recalcular parcelas/emissor) — por isso
    // dispara os dois eventos depois de preencher, senão o formulário fica
    // com CPF preenchido mas o Mercado Pago nunca "percebe" isso acontecer.
    function setAndNotify(id, value) {
      var el = document.getElementById(id);
      if (!el || !value || el.value === value) return;
      el.value = value;
      el.dispatchEvent(new Event('input', { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    }

    setAndNotify('mpCardholderEmail', email);
    setAndNotify('mpIdentificationType', 'CPF');
    setAndNotify('mpIdentificationNumber', cpf);
  });
}

function showPaymentError(msg) {
  var box = document.getElementById('mpCardMsg');
  if (box) { box.textContent = msg; box.className = 'mp-card-msg error'; }
  else alert(msg);
}

// Atualiza só o botão de pagar, sem chamar renderAll() — um re-render
// completo destrói e tenta remontar o formulário de cartão do Mercado Pago
// (ele é um iframe de verdade, não HTML comum, e não sobrevive a isso no
// meio de uma tentativa de pagamento: os campos ficam em branco e param de
// aceitar digitação). Fora do fluxo de pagamento, renderAll() continua
// normal — isso só evita chamá-lo justamente nesses 3 pontos.
function setSubmitProcessing(isProcessing) {
  var btn = document.querySelector('.btn-submit');
  if (!btn) return;
  btn.disabled = isProcessing;
  btn.innerHTML = isProcessing
    ? '<span>Processando pagamento...</span>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span data-text="finalizar_pedido">Finalizar Pedido</span>';
}

async function finalize(){
  if (state.paying) return; // trava contra clique duplo / envio duplicado

  var addrs = Store.getAddresses();
  var addr = addrs.find(function(a){ return a.id === state.addressId; });
  var ship = shipOpts.find(function(s){ return s.id === state.shipId; });
  var user = Store.getUser() || {};

  var payerEmail = user.email || state.guestEmail;
  var payerCpf = (user.cpf || state.guestCpf || '').replace(/\D/g, '');
  if (!payerEmail || payerCpf.length !== 11) {
    alert('Preencha um e-mail e um CPF válido (11 números) na seção Contato antes de pagar — o Mercado Pago exige isso.');
    return;
  }

  var cardData = null;
  if (state.payId === 'credit_card') {
    cardData = MPClient.getCardFormData(mpCardFormCtl);
    if (!cardData || !cardData.token) {
      showPaymentError('Confira os dados do cartão — algum campo está incompleto ou inválido.');
      return;
    }
  }

  // Gerada a cada tentativa: impede que uma falha de rede reenvie a MESMA
  // cobrança duas vezes (a Edge Function usa isso como X-Idempotency-Key no
  // Mercado Pago e também deduplica no nosso próprio banco).
  checkoutIdempotencyKey = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : ('idem-' + Date.now() + '-' + Math.random().toString(36).slice(2));

  state.paying = true;
  setSubmitProcessing(true);

  var payload = {
    idempotency_key: checkoutIdempotencyKey,
    items: items.map(function (i) { return { product_id: i.id, qty: i.qty }; }),
    shipping_method_id: state.shipId,
    coupon_code: state.cupom ? state.cupom.codigo : null,
    address: addr || null,
    payment_method: state.payId,
    payer: {
      email: payerEmail,
      first_name: (user.name || '').split(' ')[0] || payerEmail,
      last_name: (user.name || '').split(' ').slice(1).join(' ') || '',
      cpf: payerCpf,
    },
  };
  if (cardData) payload.card = { token: cardData.token, installments: cardData.installments, payment_method_id: cardData.paymentMethodId };

  var resp, invokeErr;
  try {
    resp = await window.sb.functions.invoke('mp-create-payment', { body: payload });
    invokeErr = resp && resp.error;
  } catch (e) {
    invokeErr = e;
  }
  var data = resp && resp.data;

  if (invokeErr || !data || data.ok === false) {
    state.paying = false;
    setSubmitProcessing(false);
    showPaymentError((data && data.error) || 'Não foi possível conectar ao processador de pagamento. Tente novamente.');
    return; // nada foi cobrado de verdade — carrinho preservado, pode tentar de novo
  }

  if (data.status === 'recusado') {
    state.paying = false;
    setSubmitProcessing(false);
    showPaymentError('Pagamento não aprovado' + (data.status_detail ? ' (' + data.status_detail + ')' : '') + '. Confira os dados e tente novamente, ou escolha outro método.');
    return; // pedido interno já existe com status "recusado" — não duplica se o cliente tentar de novo
  }

  // Chegou até aqui = a tentativa de pagamento aconteceu de verdade
  // (aprovado ou pendente, caso do Pix aguardando o cliente pagar).
  Store.clearCart();
  Store.setCheckoutItems([]);
  // O evento "purchase" (GA4/Meta/TikTok) só dispara em pedido-concluido.html
  // quando o pagamento é realmente confirmado como "pago" — aqui ainda pode
  // ser só um Pix pendente, contar como venda concluída seria enganoso.

  var prodLines = items.map(function(i){ return '• ' + i.qty + 'x ' + i.name; }).join('\n');
  var statusLabel = data.status === 'aprovado' ? 'Pago (' + (state.payId === 'pix' ? 'Pix' : 'Cartão') + ')' : 'Aguardando pagamento (Pix)';
  var msg = '🛒 *NOVO PEDIDO — ALFA INFORMÁTICA*\n\n'
    + '👤 *Cliente:* ' + (user.name || payerEmail || '—') + '\n'
    + '📍 *Endereço:* ' + (addr ? (addr.rua+', '+addr.numero+' - '+addr.bairro+', '+addr.cid+'/'+addr.uf) : '—') + '\n'
    + '🚚 *Envio:* ' + (ship?ship.name:'—') + '\n\n'
    + '*📦 PRODUTOS:*\n' + prodLines + '\n\n'
    + '*💳 Status: ' + statusLabel + '*'
    + '\n\n_Pedido ' + data.order_number + ' via site Alfa Informática_';
  window.open(WPP + '?text=' + encodeURIComponent(msg), '_blank');

  location.href = 'pedido-concluido.html?pedido=' + encodeURIComponent(data.order_number);
}
