<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:var(--primary);}
.pg-banner{width:100%;height:220px;object-fit:cover;display:block;}
.pg-wrap{max-width:820px;margin:0 auto;padding:44px 24px 80px;}
.pg-title{font-size:30px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px;}
.pg-subtitle{font-size:15px;color:var(--text-secondary);margin-bottom:32px;}
.pg-content{font-size:15px;line-height:1.8;color:var(--text-secondary);}
.pg-content h2{font-size:20px;font-weight:800;color:var(--text-main);margin:26px 0 12px;}
.pg-content h3{font-size:16px;font-weight:700;color:var(--text-main);margin:20px 0 10px;}
.pg-content p{margin-bottom:14px;}
.pg-content ul,.pg-content ol{margin:0 0 14px 22px;}
.pg-empty{text-align:center;padding:100px 20px;color:var(--text-muted);}
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;}
.wpp-float svg{width:30px;height:30px;}
</style>

<script>
async function load() {
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  const root = document.getElementById('pgRoot');
  if (!slug) { root.innerHTML = '<div class="pg-empty">Página não especificada.</div>'; return; }

  // Sem filtro de status aqui de propósito: o RLS da tabela já garante que um
  // visitante anônimo só recebe a linha se status='publicado' — quem vê
  // rascunho é só staff com permissão (preview no painel). Ver
  // schema-cms.sql, policy paginas_cms_select.
  const { data } = await window.sb.from('paginas_cms').select('*').eq('slug', slug).maybeSingle();
  if (!data) { root.innerHTML = '<div class="pg-empty">Esta página não existe ou ainda não foi publicada.</div>'; return; }

  document.title = (data.seo_titulo || data.titulo) + ' — Alfa Informática';
  if (data.seo_description) {
    const meta = document.createElement('meta');
    meta.name = 'description'; meta.content = data.seo_description;
    document.head.appendChild(meta);
  }

  const draftBanner = data.status !== 'publicado'
    ? '<div style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f5b942;padding:10px 16px;text-align:center;font-size:12.5px;">Pré-visualização — esta página ainda não foi publicada.</div>'
    : '';
  root.innerHTML = draftBanner +
    (data.banner_url ? `<img class="pg-banner" src="${data.banner_url}" alt="">` : '') +
    `<div class="pg-wrap">
      <h1 class="pg-title">${data.titulo}</h1>
      ${data.subtitulo ? `<p class="pg-subtitle">${data.subtitulo}</p>` : ''}
      <div class="pg-content">${data.conteudo_html || ''}</div>
    </div>`;
}
load();
</script>
