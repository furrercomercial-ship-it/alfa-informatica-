<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Todas as Categorias — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.cg-wrap{max-width:1300px;margin:0 auto;padding:44px 24px 80px;}
.cg-title{font-size:30px;font-weight:800;letter-spacing:-.4px;margin-bottom:32px;}
.cg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
.cg-card{background:var(--bg-card);border:1px solid var(--border-color);overflow:hidden;transition:transform .2s,border-color .2s;}
.cg-card:hover{transform:translateY(-4px);border-color:var(--primary);}
.cg-img{height:140px;background:var(--bg-section);display:flex;align-items:center;justify-content:center;}
.cg-img img{width:100%;height:100%;object-fit:cover;}
.cg-name{padding:16px;font-size:14.5px;font-weight:700;text-align:center;}
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;}
.wpp-float svg{width:30px;height:30px;}
</style>
<link rel="stylesheet" href="header.css?v=2">
<link rel="stylesheet" href="footer.css?v=3">
<link rel="stylesheet" href="popups.css">

</head>
<body>
<div id="site-header"></div>

<script>
async function load() {
  const { data } = await window.sb.from('categories').select('*').eq('ativo', true).order('ordem');
  const grid = document.getElementById('cgGrid');
  if (!data || !data.length) { grid.innerHTML = '<p style="color:var(--text-muted);">Nenhuma categoria cadastrada.</p>'; return; }
  grid.innerHTML = data.map(c => `
    <a class="cg-card" href="categoria.html?cat=${c.slug}">
      <div class="cg-img" style="${c.cor ? 'background:' + c.cor + ';' : ''}">${c.imagem_url ? `<img src="${c.imagem_url}" alt="">` : ''}</div>
      <div class="cg-name">${c.nome}</div>
    </a>`).join('');
}
load();
</script>
<script src="footer.js?v=3"></script>
</body>
</html>
