<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produto — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
  --rad:10px; --trans:.26s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* ── PAGE ── */
.page{max-width:1500px;margin:0 auto;padding:22px 28px 80px;}

/* ── LOADING ── */
.prod-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:120px 20px;color:var(--text-muted);font-size:14px;}
.prod-loading-spinner{width:34px;height:34px;border:3px solid var(--border-color);border-top-color:var(--primary);border-radius:50%;animation:prod-spin .7s linear infinite;}
@keyframes prod-spin{to{transform:rotate(360deg);}}

/* ── BREADCRUMB ── */
.bc{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-muted);margin-bottom:20px;flex-wrap:wrap;}
.bc a{color:var(--text-muted);transition:color .15s;}
.bc a:hover{color:var(--text-secondary);}
.bc-sep{color:var(--text-muted);}
.bc-cur{color:var(--text-secondary);}

/* ── MAIN GRID ── */
.prod-main{display:grid;grid-template-columns:1fr 530px;gap:40px;align-items:start;margin-bottom:48px;}

/* ── GALLERY ── */
.gallery{position:sticky;top:90px;}
.gallery-wrap{position:relative;background:#fff;border-radius:0;overflow:hidden;height:480px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.gallery-wrap img#mainImg{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;padding:24px;box-sizing:border-box;transition:transform .3s ease;display:block;}
.gallery-wrap img#mainImg:hover{transform:scale(1.04);}
.gal-arr{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;background:transparent;border:none;border-radius:0;color:var(--primary);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .18s,color .18s;z-index:2;}
.gal-arr:hover{color:var(--primary-hover);transform:translateY(-50%) scale(1.15);}
.gal-arr.left{left:12px;}
.gal-arr.right{right:12px;}
.gallery-thumbs{display:flex;gap:8px;flex-wrap:wrap;}
.thumb{width:68px;height:68px;background:#fff;border-radius:0;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0;}
.thumb.active,.thumb:hover{border-color:#D71920;}
.thumb img{width:100%;height:100%;object-fit:contain;padding:5px;box-sizing:border-box;display:block;}

/* ── PRODUCT INFO ── */
.pinfo{}

/* Frete badge */
.frete-badge{display:inline-flex;align-items:center;gap:7px;background:var(--alfa-badge-bg,#3B9EFF);color:var(--alfa-badge-text,#fff);font-size:13.5px;font-weight:700;padding:7px 15px;border-radius:0;margin-bottom:18px;}

/* Stars */
.rating-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.stars-empty{color:var(--text-muted);font-size:18px;letter-spacing:2px;}
.stars-filled{color:var(--alfa-rating-star,#F59E0B);font-size:18px;letter-spacing:2px;}
.rating-num{font-size:15px;color:var(--text-secondary);}
.rating-count{font-size:13.5px;color:var(--text-muted);}

/* Name */
.pinfo-name{font-size:24px;font-weight:700;color:var(--text-main);line-height:1.3;text-transform:uppercase;letter-spacing:.2px;margin-bottom:18px;}

/* Status + SKU */
.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.status-available{font-size:13.5px;font-weight:700;color:var(--success);text-transform:uppercase;letter-spacing:.5px;}
.status-sku{font-size:12.5px;color:var(--text-muted);}

/* Brand */
.brand-row{font-size:14.5px;color:var(--text-secondary);margin-bottom:24px;}
.brand-row strong{color:var(--text-main);}

/* ── PRICING ── */
.pricing-block{display:flex;align-items:center;gap:0;margin-bottom:22px;background:transparent;border:none;border-radius:0;overflow:visible;}
.price-col{flex:1;padding:8px 26px;display:flex;flex-direction:column;gap:6px;}
.price-col:first-child{padding-left:0;}
.price-col-sep{width:1px;background:var(--border-color);align-self:stretch;flex-shrink:0;}
.p-old-price{font-size:12.5px;color:var(--alfa-price-old,var(--text-muted));margin-bottom:2px;display:block;}
.p-old-price s{color:var(--alfa-price-old,var(--text-muted));}
.p-avista-lbl{font-size:12px;color:var(--text-secondary);font-weight:400;}
.p-main-val{font-size:37px;font-weight:600;color:var(--alfa-price-pix,var(--success));line-height:1;letter-spacing:-.5px;}
.p-pix-note{font-size:12px;color:var(--text-muted);}
.p-card-val{font-size:27px;font-weight:600;color:var(--alfa-price-installment,var(--success));line-height:1;margin-bottom:2px;}
.p-inst-info{font-size:12.5px;color:var(--text-secondary);line-height:1.7;}

/* ── COMPRAR BUTTON ── */
.btn-comprar{width:100%;height:60px;background:var(--alfa-btn-buy-bg,var(--success));border:none;border-radius:0;color:var(--alfa-btn-buy-text,#fff);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:16px;transition:background .18s;margin-bottom:12px;}
.btn-comprar:hover{background:var(--alfa-btn-buy-hover,var(--success-hover));}
.btn-comprar-left{display:flex;flex-direction:column;align-items:flex-start;}
.btn-comprar-main{font-size:18px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.btn-comprar-sub{font-size:10.5px;font-weight:500;opacity:.8;}

/* Add to cart (secondary) */
.btn-add-cart{width:100%;height:46px;background:var(--alfa-btn-secondary-bg,transparent);border:2px solid var(--alfa-btn-secondary-text,var(--primary));border-radius:0;color:var(--alfa-btn-secondary-text,var(--primary));cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;font-weight:600;transition:border-color .18s,color .18s,background .18s;margin-bottom:20px;}
.btn-add-cart:hover{border-color:var(--alfa-btn-secondary-hover,var(--primary-hover));color:var(--alfa-btn-secondary-hover,var(--primary-hover));background:rgba(0,102,255,.06);}

/* ── PARCELAMENTO ── */
.parcel-section{margin-bottom:28px;}
.parcel-title{font-size:15.5px;font-weight:700;color:#3B9EFF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-color);}
.parcel-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.parcel-row{display:flex;align-items:center;gap:6px;padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--border-color);color:var(--text-secondary);}
.parcel-row-lbl{color:var(--text-muted);font-size:11.5px;}

/* ── PAYMENT CARDS ── */
.pay-cards{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pcard{height:38px;border-radius:0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:1px solid rgba(0,0,0,.18);position:relative;}
.visa-card{background:#fff;padding:0 10px;min-width:56px;}
.visa-card span{font-family:Arial,Helvetica,sans-serif;font-style:italic;font-weight:900;font-size:17px;color:#1A1F71;letter-spacing:-.5px;line-height:1;}
.mc-card{background:#fff;padding:0 10px;min-width:56px;}
.mc-circles{position:relative;width:34px;height:22px;flex-shrink:0;}
.mc-cl{position:absolute;left:0;top:0;width:22px;height:22px;background:#EB001B;border-radius:50%;}
.mc-cr{position:absolute;right:0;top:0;width:22px;height:22px;background:#F79E1B;border-radius:50%;mix-blend-mode:multiply;}
.amex-card{background:#006FCF;padding:0 10px;min-width:78px;}
.amex-card span{color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:700;text-align:center;line-height:1;letter-spacing:.2px;}
.diners-card{background:#fff;padding:0 9px;min-width:64px;gap:6px;}
.diners-logo{position:relative;width:22px;height:22px;flex-shrink:0;border-radius:50%;background:#0165AE;overflow:hidden;}
.diners-logo::before{content:'';position:absolute;left:-3px;top:2px;width:14px;height:18px;background:#fff;border-radius:50%;}
.diners-logo::after{content:'';position:absolute;right:-3px;top:2px;width:14px;height:18px;background:#fff;border-radius:50%;}
.diners-lbl{font-size:8px;font-weight:800;color:#0165AE;letter-spacing:-.2px;line-height:1.1;}
.elo-card{background:#fff;padding:0 9px;min-width:52px;}
.elo-logo{position:relative;width:30px;height:22px;flex-shrink:0;}
.elo-y{position:absolute;left:0;top:2px;width:14px;height:14px;border-radius:50%;background:#FFCB05;}
.elo-c{position:absolute;left:7px;top:6px;width:14px;height:14px;border-radius:50%;background:#00A4E0;mix-blend-mode:multiply;}
.elo-k{position:absolute;left:13px;top:1px;width:14px;height:14px;border-radius:50%;background:#000;mix-blend-mode:multiply;opacity:.85;}
.hiper-card{background:#8A1E3C;padding:0 10px;min-width:68px;}
.hiper-card span{color:#fff;font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:11px;font-weight:700;letter-spacing:.2px;}

/* ── TABS (descrição + specs) ── */
.tabs-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;overflow:hidden;}
.tab-nav{display:flex;border-bottom:1px solid var(--border-color);}
.tab-btn{padding:14px 24px;background:transparent;border:none;color:var(--text-muted);font-size:13.5px;font-weight:600;cursor:pointer;transition:color .18s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--text-main);border-bottom-color:#D71920;}
.tab-btn:hover{color:var(--text-secondary);}
.tab-body{display:none;padding:28px 32px;}
.tab-body.active{display:block;}
.desc-text{font-size:14px;color:var(--text-secondary);line-height:1.8;}
.desc-text strong{color:var(--text-main);}
.specs-table{width:100%;border-collapse:collapse;}
.specs-table tr:nth-child(even) td{background:rgba(128,128,128,.06);}
.specs-table td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border-color);}
.specs-table td:first-child{color:var(--text-secondary);width:40%;}
.specs-table td:last-child{color:var(--text-main);font-weight:500;}

/* ── QTY ── */
.qty-wrap{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.qty-label{font-size:13px;color:var(--text-secondary);}
.qty-ctrl{display:flex;align-items:center;background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;overflow:hidden;}
.qty-btn{width:36px;height:36px;background:transparent;border:none;color:var(--text-main);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.qty-btn:hover{background:rgba(128,128,128,.15);}
.qty-val{min-width:40px;text-align:center;font-size:14px;font-weight:700;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;background:#1a2744;border:1px solid rgba(37,99,235,.4);color:#fff;padding:14px 22px;border-radius:0;font-size:13px;z-index:9999;opacity:0;transform:translateY(12px);transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* ── NOT FOUND ── */
.not-found{text-align:center;padding:100px 20px;color:var(--text-muted);}
.not-found h2{font-size:22px;margin-bottom:12px;color:var(--text-secondary);}
.not-found p{font-size:14px;margin-bottom:28px;}
.btn-home{display:inline-block;padding:12px 28px;background:#2563EB;color:#fff;border-radius:0;font-size:13px;font-weight:700;}

/* ── RESPONSIVE ── */
@media(max-width:1000px){.prod-main{grid-template-columns:1fr;}.gallery{position:static;}}
@media(max-width:600px){.page{padding:14px 14px 60px;}.pinfo-name{font-size:15px;}.p-main-val{font-size:24px;}.tab-body{padding:18px 14px;}}

/* ══ SUPORTE FLUTUANTE ══ */
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;transition:transform .2s,box-shadow .2s;}
.wpp-float:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,0,0,.45);}
.wpp-float svg{width:30px;height:30px;}
@media(max-width:600px){.wpp-float{width:52px;height:52px;bottom:18px;right:18px;}.wpp-float svg{width:26px;height:26px;}}

/* ══ AVALIAÇÕES ══ */
.rev-section{background:var(--bg-section);border-radius:0;padding:32px;margin-top:36px;max-width:1500px;margin-left:auto;margin-right:auto;}
.rev-head{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.rev-ico-badge{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rev-title{font-size:18px;font-weight:800;color:var(--text-main);text-transform:uppercase;letter-spacing:.03em;}
.rev-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border-color);}
.rev-field-inline{display:flex;flex-direction:column;gap:5px;}
.rev-field-inline label{font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.rev-select,.rev-search{height:38px;padding:0 12px;border:1px solid var(--border-color);border-radius:0;background:var(--bg-card);color:var(--text-main);font-size:13px;font-family:inherit;}
.rev-search{flex:1;min-width:180px;}
.rev-switch{display:flex;align-items:center;gap:9px;cursor:pointer;}
.rev-switch input{display:none;}
.rev-switch-track{width:38px;height:20px;border-radius:10px;background:var(--border-color);position:relative;flex-shrink:0;transition:background .2s;}
.rev-switch-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.rev-switch input:checked + .rev-switch-track{background:var(--primary);}
.rev-switch input:checked + .rev-switch-track .rev-switch-knob{left:20px;}
.rev-switch-lbl{font-size:13px;color:var(--text-secondary);white-space:nowrap;}
.rev-add-btn{margin-left:auto;height:38px;padding:0 20px;background:var(--success);color:#fff;border:none;border-radius:0;font-size:12.5px;font-weight:800;letter-spacing:.03em;cursor:pointer;transition:background .18s;white-space:nowrap;}
.rev-add-btn:hover{background:var(--success-hover);}
.rev-summary{display:flex;gap:40px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:28px 32px;margin-bottom:28px;flex-wrap:wrap;}
.rev-avg-block{display:flex;flex-direction:column;align-items:flex-start;gap:6px;min-width:160px;}
.rev-avg-lbl{font-size:13px;font-weight:700;color:var(--text-main);}
.rev-avg-num{font-size:40px;font-weight:800;color:var(--text-main);line-height:1;}
.rev-avg-count{font-size:12px;color:var(--text-muted);}
.rev-stars{display:inline-flex;gap:2px;}
.rev-bars{flex:1;min-width:260px;display:flex;flex-direction:column;gap:8px;justify-content:center;}
.rev-bar-row{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--text-secondary);}
.rev-bar-lbl{width:70px;flex-shrink:0;}
.rev-bar-track{flex:1;height:8px;border-radius:0;background:var(--border-color);overflow:hidden;}
.rev-bar-fill{height:100%;background:#F59E0B;border-radius:0;transition:width .3s ease;}
.rev-bar-count{width:24px;text-align:right;flex-shrink:0;color:var(--text-muted);}
.rev-empty{text-align:center;padding:36px 20px;color:var(--text-muted);font-size:13.5px;}
.rev-list{display:flex;flex-direction:column;gap:16px;}
.rev-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:20px 22px;}
.rev-card-head{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
.rev-card-name{font-size:13.5px;font-weight:700;color:var(--text-main);}
.rev-card-date{font-size:11.5px;color:var(--text-muted);margin-left:auto;}
.rev-card-title{font-size:13.5px;font-weight:700;color:var(--text-main);margin-bottom:4px;}
.rev-card-comment{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.rev-card-media{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.rev-card-media img,.rev-card-media video{width:80px;height:80px;object-fit:cover;border-radius:0;border:1px solid var(--border-color);}

.rev-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px;}
.rev-modal{background:var(--bg-card);border-radius:0;padding:32px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;position:relative;}
.rev-modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;color:var(--text-muted);cursor:pointer;line-height:1;}
.rev-modal-title{font-size:18px;font-weight:800;color:var(--text-main);margin-bottom:22px;}
.rev-field{margin-bottom:18px;}
.rev-field label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.rev-field input[type="text"],.rev-field textarea{width:100%;padding:10px 14px;border:1px solid var(--border-color);border-radius:0;background:var(--bg-main);color:var(--text-main);font-size:13.5px;font-family:inherit;resize:vertical;box-sizing:border-box;}
.rev-star-picker{display:flex;gap:6px;}
.rev-star-picker svg{cursor:pointer;transition:transform .1s;}
.rev-star-picker svg:hover{transform:scale(1.15);}
.rev-media-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.rev-thumb{position:relative;width:60px;height:60px;}
.rev-thumb img,.rev-thumb video{width:100%;height:100%;object-fit:cover;border-radius:0;border:1px solid var(--border-color);}
.rev-thumb button{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#D71920;color:#fff;border:none;font-size:12px;cursor:pointer;line-height:1;padding:0;}
.rev-error{color:#D71920;font-size:12.5px;margin-bottom:14px;}
.rev-submit-btn{width:100%;height:46px;background:var(--success);color:#fff;border:none;border-radius:0;font-size:14px;font-weight:700;cursor:pointer;transition:background .18s;}
.rev-submit-btn:hover{background:var(--success-hover);}
@media(max-width:700px){
  .rev-section{padding:20px;}
  .rev-controls{flex-direction:column;align-items:stretch;}
  .rev-add-btn{margin-left:0;width:100%;}
  .rev-summary{flex-direction:column;gap:20px;}
}
</style>

</head>
<body>

<div id="site-header"></div>

<div class="page" id="pageContent">
  <div class="prod-loading" id="prodLoading">
    <div class="prod-loading-spinner"></div>
    <p>Carregando produto...</p>
  </div>
  <div class="not-found" id="notFound" style="display:none">
    <h2>Produto não encontrado</h2>
    <p>O produto que você procura não está disponível.</p>
    <a href="alfa-replica.html" class="btn-home">Ver todos os produtos</a>
  </div>
</div>

<div id="reviewsSection" data-block="avaliacoes"></div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="site-meta.js"></script>
<script src="consent.js"></script>
<script src="event-manager.js"></script>
<script src="script-engine.js"></script>
<script src="popups.js"></script>
<script src="theme-loader.js?v=4"></script>
<script src="site-texts.js"></script>
<script src="page-blocks.js"></script>
<script src="store.js"></script>
<script src="products.js"></script>
<script src="categories.js"></script>
<script src="header.js"></script>
<script>
const fmt = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
let qty = 1;

// ── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, border) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = border || 'rgba(37,99,235,.4)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── FUZZY FIND ───────────────────────────────────────────────────────────────
function fuzzyFind(q) {
  if (!q || !window.PRODUCTS_DB) return null;
  const ql = q.toLowerCase();
  let p = window.PRODUCTS_DB.find(x => x.name.toLowerCase().includes(ql.slice(0,30)));
  if (p) return p;
  const STOP = new Set(['de','da','do','para','com','sem','por','em','ao','um','uma','que']);
  const words = ql.split(/[\s\-\/\+\(\)\.]+/).filter(w => w.length > 2 && !STOP.has(w));
  let best = null, bestScore = 0;
  for (const prod of window.PRODUCTS_DB) {
    const nl = prod.name.toLowerCase();
    let score = 0;
    for (const w of words) { if (nl.includes(w)) score += w.length > 5 ? 3 : 1; }
    if (score > bestScore) { bestScore = score; best = prod; }
  }
  return bestScore >= 3 ? best : null;
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
function loadProduct() {
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id'));
  const q  = (params.get('q') || '').trim();
  let p = null;
  if (id && window.PRODUCTS_DB) p = window.PRODUCTS_DB.find(x => x.id === id);
  if (!p && q && window.PRODUCTS_DB) p = fuzzyFind(q);
  if (!id && !q) { location.replace('alfa-replica.html'); return; }
  if (!p) {
    document.getElementById('prodLoading').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
    return;
  }
  renderProduct(p);
  renderReviews();
  if (window.AlfaEvents) window.AlfaEvents.track('view_item', { value: p.price, items: [{ id: p.id, name: p.name, category: p.category, price: p.price, qty: 1 }] });
}

// ── GALLERY CONTROLS ─────────────────────────────────────────────────────────
function changeImg(thumb, src, idx) {
  document.getElementById('mainImg').src = src;
  _imgIdx = idx;
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
}
function prevImg() {
  _imgIdx = (_imgIdx - 1 + _imgList.length) % _imgList.length;
  document.getElementById('mainImg').src = _imgList[_imgIdx];
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===_imgIdx));
}
function nextImg() {
  _imgIdx = (_imgIdx + 1) % _imgList.length;
  document.getElementById('mainImg').src = _imgList[_imgIdx];
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===_imgIdx));
}

// ── QTY ──────────────────────────────────────────────────────────────────────
function changeQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qtyVal').textContent = qty;
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// ── CART / BUY ───────────────────────────────────────────────────────────────
function addCart() {
  const p = window._currentProduct;
  if (!p) return;
  for (let i=0; i<qty; i++) Store.addToCart({...p, id:String(p.id)});
  showToast(`Adicionado ao carrinho!`, 'rgba(0,168,45,.5)');
}
function buyNow() {
  const p = window._currentProduct;
  if (!p) return;
  const item = {...p, id:String(p.id), qty, selected:true};
  Store.addToCart({...p, id:String(p.id)});
  Store.setCheckoutItems([item]);
  location.href = 'checkout.html';
}

// ── AVALIAÇÕES ───────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtReviewDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR');
}
function starIcon(filled) {
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="${filled ? '#F59E0B' : 'none'}" stroke="${filled ? '#F59E0B' : 'var(--text-muted)'}" stroke-width="1.5"><polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.5 5.5 21 7 14 2 9.3 9 8.5"/></svg>`;
}
function starsHtml(n) {
  n = Math.round(n);
  let out = '<span class="rev-stars">';
  for (let i = 1; i <= 5; i++) out += starIcon(i <= n);
  return out + '</span>';
}

let _productReviews = [];
async function renderReviews() {
  const p = window._currentProduct;
  if (!p) return;
  _productReviews = await Store.getReviewsByProduct(p.id);
  const all = _productReviews;
  const total = all.length;
  const avg = total ? all.reduce((s,r) => s + r.rating, 0) / total : 0;
  const counts = [5,4,3,2,1].map(n => all.filter(r => r.rating === n).length);
  const barsHtml = [5,4,3,2,1].map((n,i) => {
    const c = counts[i];
    const pct = total ? (c / total * 100) : 0;
    return `<div class="rev-bar-row"><span class="rev-bar-lbl">${n} estrelas</span><div class="rev-bar-track"><div class="rev-bar-fill" style="width:${pct}%"></div></div><span class="rev-bar-count">${c}</span></div>`;
  }).join('');

  document.getElementById('reviewsSection').innerHTML = `
    <div class="rev-section">
      <div class="rev-head">
        <div class="rev-ico-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.5 5.5 21 7 14 2 9.3 9 8.5"/></svg></div>
        <div class="rev-title">Veja as avaliações do produto</div>
      </div>

      <div class="rev-controls">
        <div class="rev-field-inline">
          <label>Ordenar por:</label>
          <select class="rev-select" onchange="reviewState.sort=this.value;renderReviewsList();">
            <option value="recent" ${reviewState.sort==='recent'?'selected':''}>Mais recentes</option>
            <option value="oldest" ${reviewState.sort==='oldest'?'selected':''}>Mais antigas</option>
            <option value="highest" ${reviewState.sort==='highest'?'selected':''}>Maior nota</option>
            <option value="lowest" ${reviewState.sort==='lowest'?'selected':''}>Menor nota</option>
          </select>
        </div>
        <div class="rev-field-inline">
          <label>Filtrar por:</label>
          <select class="rev-select" onchange="reviewState.filterStars=Number(this.value);renderReviewsList();">
            <option value="0">Todas</option>
            <option value="5" ${reviewState.filterStars===5?'selected':''}>5 estrelas</option>
            <option value="4" ${reviewState.filterStars===4?'selected':''}>4 estrelas</option>
            <option value="3" ${reviewState.filterStars===3?'selected':''}>3 estrelas</option>
            <option value="2" ${reviewState.filterStars===2?'selected':''}>2 estrelas</option>
            <option value="1" ${reviewState.filterStars===1?'selected':''}>1 estrela</option>
          </select>
        </div>
        <input class="rev-search" type="text" placeholder="Procurar por review" value="${escapeHtml(reviewState.search)}" oninput="reviewState.search=this.value;renderReviewsList();">
        <label class="rev-switch">
          <input type="checkbox" ${reviewState.onlyMedia?'checked':''} onchange="reviewState.onlyMedia=this.checked;renderReviewsList();">
          <span class="rev-switch-track"><span class="rev-switch-knob"></span></span>
          <span class="rev-switch-lbl">Somente com fotos/vídeos</span>
        </label>
        <button class="rev-add-btn" onclick="openReviewModal()">ADICIONAR UMA AVALIAÇÃO</button>
      </div>

      <div class="rev-summary">
        <div class="rev-avg-block">
          <div class="rev-avg-lbl">Avaliação do produto</div>
          <div class="rev-avg-num">${avg.toFixed(1)}</div>
          ${starsHtml(avg)}
          <div class="rev-avg-count">(${total} avaliaç${total===1?'ão':'ões'})</div>
        </div>
        <div class="rev-bars">${barsHtml}</div>
      </div>

      <div id="revListArea"></div>
    </div>
  `;
  renderReviewsList();
  if (window.AlfaBlocks) AlfaBlocks.apply('produto');
  if (window.AlfaTexts) AlfaTexts.apply();
}

function renderReviewsList() {
  const p = window._currentProduct;
  if (!p) return;
  const all = _productReviews;
  const total = all.length;
  let list = all.slice();
  if (reviewState.filterStars) list = list.filter(r => r.rating === reviewState.filterStars);
  if (reviewState.onlyMedia) list = list.filter(r => r.media_urls && r.media_urls.length);
  if (reviewState.search.trim()) {
    const q = reviewState.search.trim().toLowerCase();
    list = list.filter(r => (r.title||'').toLowerCase().includes(q) || (r.comment||'').toLowerCase().includes(q));
  }
  list.sort((a,b) => {
    if (reviewState.sort==='recent')  return new Date(b.created_at) - new Date(a.created_at);
    if (reviewState.sort==='oldest')  return new Date(a.created_at) - new Date(b.created_at);
    if (reviewState.sort==='highest') return b.rating - a.rating;
    if (reviewState.sort==='lowest')  return a.rating - b.rating;
    return 0;
  });

  const area = document.getElementById('revListArea');
  if (!area) return;
  if (total === 0) {
    area.innerHTML = '<div class="rev-empty">Nenhuma avaliação para esse produto. Seja o primeiro a avaliar!</div>';
    return;
  }
  if (list.length === 0) {
    area.innerHTML = '<div class="rev-empty">Nenhuma avaliação encontrada para esse filtro.</div>';
    return;
  }
  area.innerHTML = '<div class="rev-list">' + list.map(r => `
    <div class="rev-card">
      <div class="rev-card-head">
        <div class="rev-card-name">${escapeHtml(r.customer_name || 'Cliente')}</div>
        ${starsHtml(r.rating)}
        <div class="rev-card-date">${fmtReviewDate(r.created_at)}</div>
      </div>
      ${r.title ? `<div class="rev-card-title">${escapeHtml(r.title)}</div>` : ''}
      <div class="rev-card-comment">${escapeHtml(r.comment)}</div>
      ${(r.media_urls && r.media_urls.length) ? `<div class="rev-card-media">${r.media_urls.map(m =>
        (m.type||'').startsWith('video') ? `<video src="${m.url}" controls></video>` : `<img src="${m.url}" alt="">`
      ).join('')}</div>` : ''}
    </div>`).join('') + '</div>';
}

      </div>

    </div>

  document.body.appendChild(overlay);

function closeReviewModal() {
  const el = document.getElementById('revModalOverlay');
  if (el) el.remove();
}
function setModalRating(n) {
  modalRating = n;
  previewModalRating(n);
}
function previewModalRating(n) {
  document.querySelectorAll('#revStarPicker svg').forEach(svg => {
    const filled = Number(svg.dataset.n) <= n;
    svg.setAttribute('fill', filled ? '#F59E0B' : 'none');
    svg.setAttribute('stroke', filled ? '#F59E0B' : 'var(--text-muted)');
  });
}
function handleMediaFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      modalMedia.push({ url: e.target.result, type: file.type });
      renderMediaThumbs();
    };
    reader.readAsDataURL(file);
  });
}
function renderMediaThumbs() {
  const wrap = document.getElementById('revMediaThumbs');
  if (!wrap) return;
  wrap.innerHTML = modalMedia.map((m,i) => `
    <div class="rev-thumb">
      ${(m.type||'').startsWith('video') ? `<video src="${m.url}"></video>` : `<img src="${m.url}" alt="">`}
      <button onclick="removeMediaThumb(${i})">&times;</button>
    </div>`).join('');
}
function removeMediaThumb(i) {
  modalMedia.splice(i, 1);
  renderMediaThumbs();
}
async function submitReview() {
  const p = window._currentProduct;
  if (!p) return;
  const errEl = document.getElementById('revError');
  const title = document.getElementById('revTitleInput').value.trim();
  const comment = document.getElementById('revCommentInput').value.trim();
  const user = Store.getUser();
  const nameInput = document.getElementById('revNameInput');
  const name = user ? user.name : (nameInput ? nameInput.value.trim() : '');

  const errors = [];
  if (!modalRating) errors.push('Selecione uma nota de 1 a 5 estrelas.');
  if (!comment) errors.push('O comentário é obrigatório.');
  if (!user && !name) errors.push('Informe seu nome.');

  if (errors.length) {
    errEl.textContent = errors.join(' ');
    errEl.style.display = 'block';
    return;
  }

  await Store.addReview({
    product_id: p.id,
    customer_name: name,
    rating: modalRating,
    title,
    comment,
    media_urls: modalMedia,
  });

  closeReviewModal();
  showToast(
    user ? 'Sua avaliação foi publicada!' : 'Sua avaliação foi enviada e está aguardando aprovação.',
    'rgba(0,168,45,.5)'
  );
  renderReviews();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function waitReady(cb) {
  let gotProducts = window.PRODUCTS_DB.length > 0;
  let gotCategories = window.CATEGORIES_DB.length > 0;
  if (gotProducts && gotCategories) { cb(); return; }
  document.addEventListener('products:ready', () => { gotProducts = true; if (gotCategories) cb(); }, { once: true });
  document.addEventListener('categories:ready', () => { gotCategories = true; if (gotProducts) cb(); }, { once: true });
}
waitReady(loadProduct);
