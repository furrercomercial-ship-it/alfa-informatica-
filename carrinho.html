<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carrinho — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F; --bg-menu:#0052CC;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
  --tr:.25s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF; --bg-menu:#0066FF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg-main);color:var(--text-main);overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
input,button{font-family:inherit;}

/* ── BG layers ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(37,99,235,.038) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.038) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 40%,black 30%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 90% 90% at 50% 40%,black 30%,transparent 100%);
}
.bg-vignette{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 55% at 0% 0%,rgba(37,99,235,.07) 0%,transparent 60%),
    radial-gradient(ellipse 55% 55% at 100% 100%,rgba(37,99,235,.07) 0%,transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%,transparent 55%,rgba(40,40,40,.6) 100%);
}

/* ── LAYOUT ── */
.layout{
  max-width:1380px;margin:0 auto;padding:44px 40px 90px;
  display:grid;grid-template-columns:1fr 408px;gap:32px;align-items:start;
  position:relative;z-index:1;
}
#rightCol{display:flex;flex-direction:column;}

/* ── CART BOX ── */
.cart-box{background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;overflow:hidden;margin-bottom:20px;}
.cart-box-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border-color);}
.cart-box-title{font-size:19px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--text-main);}
.btn-clear-cart{background:none;border:1px solid var(--border-color);color:var(--text-secondary);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all var(--tr);}
.btn-clear-cart:hover{border-color:var(--primary);color:var(--primary);}
.cart-cols{display:grid;grid-template-columns:100px 1fr 130px 150px;gap:20px;padding:13px 26px;border-bottom:1px solid var(--border-color);}
.cart-cols span{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted);}
.cart-cols .cc-prod{grid-column:1/3;}
.cart-cols .cc-qtd{text-align:center;}
.cart-cols .cc-price{text-align:right;}

/* ── ITEM ROW ── */
.cart-item{
  display:grid;grid-template-columns:100px 1fr 130px 150px;gap:20px;align-items:center;
  padding:20px 26px;border-bottom:1px solid var(--border-color);
}
.cart-item:last-child{border-bottom:none;}

/* product image */
.item-img{
  width:100px;height:100px;flex-shrink:0;
  background:#f2f4f7;border:1px solid var(--border-color);border-radius:10px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.item-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.item-img-inner img{width:100%;height:100%;object-fit:contain;padding:8px;box-sizing:border-box;}
.item-img-ph{font-size:34px;opacity:.18;}

/* info */
.item-info{min-width:0;}
.item-brand{font-size:10px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.item-name{font-size:14.5px;font-weight:700;line-height:1.4;margin-bottom:6px;color:var(--text-main);}
.item-meta{font-size:12px;color:var(--text-secondary);line-height:1.65;}
.item-meta b{color:var(--text-main);font-weight:700;}

/* qty column */
.item-qty-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.qty{
  display:flex;align-items:center;
  background:var(--bg-main);border:1px solid var(--border-color);
  border-radius:10px;overflow:hidden;transition:border-color var(--tr);
}
.qty:hover{border-color:var(--primary);}
.qbtn{
  width:32px;height:32px;background:none;border:none;
  color:var(--text-muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all var(--tr);
}
.qbtn:hover{background:rgba(0,102,255,.14);color:var(--primary);}
.qval{
  width:38px;height:32px;background:none;border:none;
  border-left:1px solid var(--border-color);border-right:1px solid var(--border-color);
  text-align:center;color:var(--text-main);font-size:13px;font-weight:700;outline:none;
}
.btn-rm{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;color:var(--text-muted);
  font-size:11px;font-weight:600;cursor:pointer;transition:color var(--tr);
}
.btn-rm:hover{color:var(--primary);}

/* price column */
.item-price-col{text-align:right;}
.item-unit{font-size:13px;font-weight:700;color:var(--success);margin-bottom:5px;white-space:nowrap;}
.item-total-lbl{font-size:12px;color:var(--text-secondary);}
.item-total-val{font-size:12.5px;font-weight:800;color:var(--text-main);}


/* ══ OFERTAS ══ */
.ofertas{margin-top:36px;}
.of-title{font-size:20px;font-weight:800;color:var(--text-main);margin-bottom:20px;letter-spacing:-.3px;}
.of-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.of-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:14px;overflow:hidden;position:relative;transition:transform .2s,border-color .2s;}
.of-card:hover{transform:translateY(-3px);border-color:rgba(0,102,255,.35);}
.of-badge{position:absolute;top:10px;left:10px;background:var(--primary);color:#fff;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:6px;z-index:2;}
.of-img{background:#CFCFCF;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.of-img img{width:100%;height:100%;object-fit:cover;}
.of-body{padding:14px;}
.of-name{font-size:12.5px;font-weight:600;color:var(--text-main);line-height:1.35;min-height:34px;margin-bottom:8px;}
.of-old{font-size:11px;color:var(--text-secondary);text-decoration:line-through;}
.of-price{font-size:17px;font-weight:800;color:var(--success);margin-bottom:10px;}
.of-btn{display:block;text-align:center;font-size:11.5px;font-weight:700;color:#fff;background:var(--primary);border-radius:7px;padding:9px;transition:background .15s;}
.of-btn:hover{background:var(--primary-hover);}
@media(max-width:900px){.of-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:580px){.of-grid{grid-template-columns:repeat(2,1fr);}}

/* ══ SUMMARY ══ */
.summary{
  position:sticky;top:88px;
  background:var(--bg-card);
  border:1px solid var(--border-color);border-radius:16px;overflow:hidden;
}
.sum-body{padding:32px 32px 26px;}
.sum-title{font-size:23px;font-weight:800;color:var(--text-main);margin-bottom:22px;}
.sum-plain-row{display:flex;justify-content:space-between;font-size:15px;color:var(--text-secondary);padding:9px 0;}
.sum-total-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg-main);border-radius:10px;padding:16px 18px;margin:8px 0 26px;font-size:16px;font-weight:800;color:var(--text-main);}
.pix-block{text-align:center;margin-bottom:18px;}
.pix-price{font-size:36px;font-weight:900;color:var(--success);letter-spacing:-.5px;}
.pix-cap{font-size:13.5px;color:var(--text-secondary);margin-top:6px;}
.or-div{display:flex;align-items:center;gap:14px;margin:20px 0;}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border-color);}
.or-circ{width:38px;height:38px;border-radius:50%;background:var(--bg-main);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;flex-shrink:0;}
.card-block{text-align:center;margin-bottom:26px;}
.card-price{font-size:26px;font-weight:800;color:var(--primary);}
.card-cap{font-size:13.5px;color:var(--text-secondary);margin-top:6px;}
.btn-ck{
  width:100%;height:62px;
  background:var(--success);
  color:#fff;border:none;border-radius:12px;
  font-size:15.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .2s,transform .2s;
}
.btn-ck:hover{background:var(--success-hover);}
.btn-ck:active{transform:scale(.98);}
.btn-ck .btn-arrow{width:19px;height:19px;}
.btn-continue{
  width:100%;margin-top:10px;height:50px;background:transparent;
  border:1.5px solid var(--success);color:var(--success);border-radius:12px;
  font-size:13.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;
}
.btn-continue:hover{background:rgba(22,163,74,.08);}

/* accordion */
.acc-list{border-top:1px solid var(--border-color);}
.acc-item{border-bottom:1px solid var(--border-color);}
.acc-head{display:flex;align-items:center;gap:12px;padding:18px 32px;cursor:pointer;user-select:none;}
.acc-ic{color:var(--primary);flex-shrink:0;width:19px;height:19px;}
.acc-head-txt{flex:1;font-size:15px;font-weight:700;color:var(--text-main);}
.acc-chev{color:var(--text-muted);transition:transform .25s;flex-shrink:0;width:16px;height:16px;}
.acc-item.open .acc-chev{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.acc-item.open .acc-body{max-height:420px;}
.acc-body-in{padding:0 32px 24px;}
.seclabel{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.sinput-row{display:flex;gap:8px;margin-bottom:8px;}
.sinput{
  flex:1;background:var(--bg-main);border:1px solid var(--border-color);border-radius:9px;
  padding:11px 13px;font-size:13px;color:var(--text-main);font-family:inherit;outline:none;
  transition:border-color var(--tr);
}
.sinput:focus{border-color:var(--primary);}
.sinput::placeholder{color:var(--text-muted);}
.sbtn{
  padding:0 18px;background:rgba(0,102,255,.1);border:1px solid rgba(0,102,255,.3);
  border-radius:9px;color:var(--primary);font-size:12.5px;font-weight:700;cursor:pointer;
  transition:all var(--tr);white-space:nowrap;
}
.sbtn:hover{background:rgba(0,102,255,.2);border-color:var(--primary);}

/* frete */
.frete-opt{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--bg-main);border:1px solid var(--border-color);
  border-radius:10px;cursor:pointer;font-size:12.5px;transition:all var(--tr);margin-bottom:8px;
}
.frete-opt:hover{border-color:var(--primary);}
.frete-opt input{accent-color:var(--primary);}
.frete-name{flex:1;font-weight:600;color:var(--text-main);}
.frete-price{color:var(--success);font-weight:700;font-size:12.5px;}
.frete-days{color:var(--text-secondary);font-size:10.5px;}

/* empty */
.empty{grid-column:1/-1;text-align:center;padding:120px 0;}
.empty-ic{font-size:78px;opacity:.18;margin-bottom:24px;}
.empty h2{font-size:24px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;}
.empty p{font-size:14px;color:var(--text-muted);margin-bottom:32px;}
.btn-home{
  display:inline-flex;align-items:center;gap:9px;padding:15px 34px;
  background:linear-gradient(135deg,#1749c9,#2563eb);color:#fff;
  border-radius:13px;font-size:13px;font-weight:700;
  box-shadow:0 6px 28px rgba(37,99,235,.42);transition:transform .25s,box-shadow .25s;
}
.btn-home:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(37,99,235,.58);}

@media(max-width:980px){
  .layout{grid-template-columns:1fr;padding:24px 20px 60px;}
  .summary{position:static;}
}
@media(max-width:600px){
  .cart-cols{display:none;}
  .cart-item{grid-template-columns:70px 1fr;grid-template-rows:auto auto;}
  .item-img{width:70px;height:70px;grid-row:1/3;}
  .item-qty-col,.item-price-col{grid-column:2;text-align:left;align-items:flex-start;}
}

/* ══ SUPORTE FLUTUANTE ══ */
.wpp-float{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.35);color:#fff;z-index:9999;transition:transform .2s,box-shadow .2s;}
.wpp-float:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,0,0,.45);}
.wpp-float svg{width:30px;height:30px;}
@media(max-width:600px){.wpp-float{width:52px;height:52px;bottom:18px;right:18px;}.wpp-float svg{width:26px;height:26px;}}
</style>

<body>

<div id="site-header"></div>

<canvas id="bgCanvas"></canvas>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>

<div class="layout" id="layout">
  <div id="leftCol"></div>
  <div id="rightCol"></div>
</div>

<script src="store.js"></script>
<script src="products.js"></script>
<script src="header.js"></script>
<script>
/* ── Particles canvas ── */
(function(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  function init(){
    pts=[];
    for(let i=0;i<50;i++){
      pts.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
        r:Math.random()*1.3+.4,a:Math.random()*.45+.1});
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<145){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(37,99,235,${.055*(1-d/145)})`;ctx.lineWidth=.7;ctx.stroke();
        }
      }
    }
    pts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(59,130,246,${p.a})`;ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

/* ── helpers ── */
function fmt(n){return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function getSpecs(item){
  if(item.specs&&Array.isArray(item.specs))return item.specs;
  const tags=[],n=item.name||'';
  if(/DDR5/i.test(n))tags.push('DDR5');
  if(/DDR4/i.test(n))tags.push('DDR4');
  const gb=n.match(/\d+\s*GB/i);if(gb)tags.push(gb[0].replace(' ',''));
  const mhz=n.match(/\d+\s*MHz/i);if(mhz)tags.push(mhz[0].replace(' ',''));
  if(/RGB/i.test(n))tags.push('RGB');
  if(/RTX\s*\d+/i.test(n)){const r=n.match(/RTX\s*\d+\w*/i);if(r)tags.push(r[0]);}
  if(/RX\s*\d+/i.test(n)){const r=n.match(/RX\s*\d+\w*/i);if(r)tags.push(r[0]);}
  if(/SSD/i.test(n))tags.push('SSD');
  if(/NVMe/i.test(n))tags.push('NVMe');
  return tags.slice(0,5);
}

let appliedDiscount=0,fretePrice=null;
let openAcc={frete:false,cupom:false,afiliado:false};

function ofertasHtml(){
  const items=(window.PRODUCTS_DB||[]).filter(p=>p.old && p.old>p.price).slice(0,4);
  return items.map(p=>{
    const off=Math.round((1-p.price/p.old)*100);
    const img=p.images&&p.images[0]?p.images[0]:'';
    return '<div class="of-card"><div class="of-badge">-'+off+'%</div>'+
      '<div class="of-img">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'')+'</div>'+
      '<div class="of-body"><div class="of-name">'+p.name+'</div>'+
      '<div class="of-old">'+fmt(p.old)+'</div><div class="of-price">'+fmt(p.price)+'</div>'+
      '<a class="of-btn" href="produto.html?q='+encodeURIComponent(p.name).replace(/[!'()*]/g,c=>'%'+c.charCodeAt(0).toString(16))+'">Ver produto</a></div></div>';
  }).join('');
}

function toggleAccCart(key){
  openAcc[key]=!openAcc[key];
  render();
}

function render(){
  const cart=Store.getCart();
  const layout=document.getElementById('layout');
  if(!cart.length){
    layout.innerHTML=`<div class="empty">
      <div class="empty-ic">🛒</div>
      <h2>Seu carrinho está vazio</h2>
      <p>Adicione produtos e volte aqui para finalizar sua compra.</p>
      <a href="alfa-replica.html" class="btn-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Ver produtos
      </a>
    </div>`;
    return;
  }

  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discount=appliedDiscount?subtotal*appliedDiscount:0;
  const freteNum=fretePrice===null?null:(fretePrice==='Grátis'?0:parseFloat(fretePrice.replace('R$ ','').replace(',','.')));
  const total=subtotal-discount+(freteNum||0);
  const pixTotal=total*0.85;
  const install=(total/12).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

  document.getElementById('leftCol').innerHTML=`
  <div class="cart-box">
    <div class="cart-box-head">
      <div class="cart-box-title">Carrinho de Compras</div>
      <button class="btn-clear-cart" onclick="if(confirm('Limpar todos os itens do carrinho?')){Store.clearCart();render();}">Limpar Carrinho</button>
    </div>
    <div class="cart-cols">
      <span class="cc-prod">Produto</span>
      <span class="cc-qtd">Qtd.</span>
      <span class="cc-price">Preço à vista no PIX</span>
    </div>
    ${cart.map(item=>{
      const specs=getSpecs(item);
      return `
      <div class="cart-item">
        <div class="item-img">
          <div class="item-img-inner">
            <img src="img teste.jpg" alt="${item.name}">
          </div>
        </div>
        <div class="item-info">
          <div class="item-brand">${item.brand||'—'}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-meta">Preço no cartão em até 12x sem juros: <b>${fmt(item.price)}</b><br>${specs.length?specs.join(' · '):'SKU: '+item.id}</div>
        </div>
        <div class="item-qty-col">
          <div class="qty">
            <button class="qbtn" onclick="Store.updateQty('${item.id}',${item.qty-1});render()">−</button>
            <input type="number" class="qval" value="${item.qty}" min="1" onchange="Store.updateQty('${item.id}',+this.value);render()">
            <button class="qbtn" onclick="Store.updateQty('${item.id}',${item.qty+1});render()">+</button>
          </div>
          <button class="btn-rm" onclick="Store.removeFromCart('${item.id}');render()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Remover
          </button>
        </div>
        <div class="item-price-col">
          <div class="item-unit">${item.qty} x ${fmt(item.price)}</div>
          <div class="item-total-lbl">Total: <span class="item-total-val">${fmt(item.price*item.qty)}</span></div>
        </div>
      </div>`;
    }).join('')}
  </div>

  <section class="ofertas">
    <div class="of-title">Ofertas e Promoções</div>
    <div class="of-grid">${ofertasHtml()}</div>
  </section>`;

  /* ── RIGHT ── */
  document.getElementById('rightCol').innerHTML=`
  <div class="summary">
    <div class="sum-body">
      <div class="sum-title">Resumo</div>
      <div class="sum-plain-row"><span>SubTotal</span><span>${fmt(subtotal)}</span></div>
      ${appliedDiscount?`<div class="sum-plain-row" style="color:var(--success);"><span>Desconto (${appliedDiscount*100}%)</span><span>− ${fmt(discount)}</span></div>`:''}
      <div class="sum-plain-row"><span>Frete</span><span id="freteVal">${fretePrice===null?'A calcular':fretePrice==='Grátis'?'Grátis':fretePrice}</span></div>
      <div class="sum-total-row"><span>Total</span><span>${fmt(total)}</span></div>

      <div class="pix-block">
        <div class="pix-price">${fmt(pixTotal)}</div>
        <div class="pix-cap">No PIX com 15% de desconto</div>
      </div>
      <div class="or-div"><div class="or-circ">Ou</div></div>
      <div class="card-block">
        <div class="card-price">${fmt(total)}</div>
        <div class="card-cap">Em até 12x de R$ ${install} sem juros no cartão</div>
      </div>

      <button class="btn-ck" onclick="goCheckout()">
        FINALIZAR PEDIDO
        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <a href="alfa-replica.html" class="btn-continue" style="display:block;text-align:center;line-height:46px;text-decoration:none;">Continuar Comprando</a>
    </div>

    <div class="acc-list">
      <div class="acc-item ${openAcc.frete?'open':''}">
        <div class="acc-head" onclick="toggleAccCart('frete')">
          <svg class="acc-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <span class="acc-head-txt">Frete e Prazos</span>
          <svg class="acc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="acc-body"><div class="acc-body-in">
          <div class="sinput-row">
            <input class="sinput" type="text" id="cepInput" placeholder="00000-000" maxlength="9">
            <button class="sbtn" onclick="calcFrete()">Calcular</button>
          </div>
          <div id="freteOptions"></div>
        </div></div>
      </div>
      <div class="acc-item ${openAcc.cupom?'open':''}">
        <div class="acc-head" onclick="toggleAccCart('cupom')">
          <svg class="acc-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.59 13.41L11 3.83A2 2 0 009.59 3.24H4a1 1 0 00-1 1v5.59a2 2 0 00.59 1.41l9.58 9.59a2 2 0 002.83 0l4.59-4.59a2 2 0 000-2.83z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span class="acc-head-txt">Cupom de desconto</span>
          <svg class="acc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="acc-body"><div class="acc-body-in">
          <div class="sinput-row">
            <input class="sinput" type="text" id="couponInput" placeholder="Código do cupom">
            <button class="sbtn" onclick="applyCoupon()">Aplicar</button>
          </div>
        </div></div>
      </div>
      <div class="acc-item ${openAcc.afiliado?'open':''}">
        <div class="acc-head" onclick="toggleAccCart('afiliado')">
          <svg class="acc-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span class="acc-head-txt">Cupom de afiliado</span>
          <svg class="acc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="acc-body"><div class="acc-body-in">
          <div class="sinput-row">
            <input class="sinput" type="text" id="affInput" placeholder="Código do afiliado">
            <button class="sbtn" onclick="applyAffiliate()">Aplicar</button>
          </div>
        </div></div>
      </div>
    </div>
  </div>`;
}

function applyAffiliate(){
  const code=document.getElementById('affInput')?.value.trim();
  if(code){ showToast('✓ Cupom de afiliado "'+code+'" aplicado!'); }
}

function applyCoupon(){
  const code=document.getElementById('couponInput')?.value.trim().toUpperCase();
  if(code==='ALFA10'){appliedDiscount=.10;showToast('✓ Cupom ALFA10 aplicado — 10% de desconto!');render();}
  else if(code==='ALFA20'){appliedDiscount=.20;showToast('✓ Cupom ALFA20 aplicado — 20% de desconto!');render();}
  else{showToast('Cupom inválido ou expirado.');}
}

function calcFrete(){
  const cep=document.getElementById('cepInput')?.value.replace(/\D/g,'');
  if(cep.length<8){showToast('CEP inválido. Informe 8 dígitos.');return;}
  const opts=[['Econômico','R$ 18,90','7–10 dias úteis'],['Expresso','R$ 34,90','3–5 dias úteis'],['Retirada na loja','Grátis','A partir de 1h']];
  document.getElementById('freteOptions').innerHTML=`<div style="margin-bottom:16px">`+
    opts.map(([n,p,d],i)=>`
    <label class="frete-opt">
      <input type="radio" name="frete" value="${p}" ${i===0?'checked':''} onchange="selectFrete('${p}')">
      <span class="frete-name">${n}</span>
      <span class="frete-price">${p}</span>
      <span class="frete-days">${d}</span>
    </label>`).join('')+`</div>`;
  fretePrice='R$ 18,90';
  document.getElementById('freteVal').textContent='R$ 18,90';
}

function selectFrete(p){
  fretePrice=p;
  document.getElementById('freteVal').textContent=p==='Grátis'?'Grátis':p;
  const cart=Store.getCart(),selected=cart.filter(i=>i.selected);
  const sub=selected.reduce((s,i)=>s+i.price*i.qty,0);
  const disc=appliedDiscount?sub*appliedDiscount:0;
  const fn=p==='Grátis'?0:parseFloat(p.replace('R$ ','').replace(',','.'));
  document.querySelector('.total-r').textContent=fmt(sub-disc+fn);
}

function goCheckout(){
  const sel=Store.getCart().filter(i=>i.selected);
  if(!sel.length)return;
  Store.setCheckoutItems(sel);
  location.href='checkout.html';
}

function showToast(msg){
  document.querySelectorAll('.toast-msg').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast-msg';
  t.style.cssText='position:fixed;bottom:28px;right:28px;background:rgba(7,11,28,.97);border:1px solid rgba(37,99,235,.3);backdrop-filter:blur(20px);color:#fff;padding:14px 22px;border-radius:13px;font-size:13.5px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease;font-family:Inter,system-ui,sans-serif;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

const _su=document.createElement('style');
_su.textContent='@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(_su);

render();
</script>
