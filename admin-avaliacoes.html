<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel de Avaliações — Alfa Informática</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-main:#202020; --bg-section:#2B2B2B; --bg-card:#303030;
  --bg-header:#1F1F1F;
  --text-main:#FFFFFF; --text-secondary:#D1D5DB; --text-muted:#9CA3AF;
  --border-color:#404040;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
[data-theme="light"]{
  --bg-main:#F5F7FA; --bg-section:#FFFFFF; --bg-card:#FFFFFF;
  --bg-header:#FFFFFF;
  --text-main:#111827; --text-secondary:#4B5563; --text-muted:#6B7280;
  --border-color:#E5E7EB;
  --primary:#0066FF; --primary-hover:#0052CC; --success:#16A34A; --success-hover:#15803D;
}
body{background:var(--bg-main);color:var(--text-main);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
a{color:inherit;text-decoration:none;}

.topbar{background:var(--bg-header);border-bottom:1px solid var(--border-color);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:17px;font-weight:800;}
.topbar-back{font-size:13px;color:var(--primary);font-weight:700;}
.topbar-back:hover{color:var(--primary-hover);}

.page{max-width:1100px;margin:0 auto;padding:28px 24px 80px;}

.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{padding:9px 18px;border:1px solid var(--border-color);border-radius:0;background:var(--bg-card);color:var(--text-secondary);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.tab-btn .cnt{opacity:.75;margin-left:5px;}

.rv-list{display:flex;flex-direction:column;gap:14px;}
.rv-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:0;padding:20px 22px;}
.rv-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px;flex-wrap:wrap;}
.rv-prod{font-size:12.5px;color:var(--primary);font-weight:700;}
.rv-prod:hover{text-decoration:underline;}
.rv-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px;}
.rv-name{font-size:13.5px;font-weight:700;}
.rv-date{font-size:11.5px;color:var(--text-muted);}
.rv-status{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:0;}
.rv-status.pending{background:rgba(245,158,11,.15);color:#F59E0B;}
.rv-status.approved{background:rgba(22,163,74,.15);color:var(--success);}
.rv-status.rejected{background:rgba(215,25,32,.15);color:#D71920;}
.rv-stars{display:inline-flex;gap:1px;}
.rv-title{font-size:13.5px;font-weight:700;margin:8px 0 4px;}
.rv-comment{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.rv-media{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.rv-media img,.rv-media video{width:70px;height:70px;object-fit:cover;border-radius:0;border:1px solid var(--border-color);}
.rv-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.rv-btn{padding:8px 16px;border-radius:0;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.rv-btn:hover{opacity:.85;}
.rv-btn.approve{background:var(--success);color:#fff;}
.rv-btn.reject{background:#D97706;color:#fff;}
.rv-btn.delete{background:#D71920;color:#fff;}
.rv-empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Painel de Avaliações</div>
  <a href="alfa-replica.html" class="topbar-back">← Voltar para a loja</a>
</div>

<div class="page">
  <div class="tabs" id="tabsArea"></div>
  <div id="listArea"></div>
</div>

<script src="store.js"></script>
<script src="products.js"></script>
<script>
let activeTab = 'pending';

function productLabel(productId) {
  const p = (window.PRODUCTS_DB || []).find(x => String(x.id) === String(productId));
  return p ? p.name : ('Produto #' + productId);
}
function starsHtml(n) {
  let out = '<span class="rv-stars">';
  for (let i = 1; i <= 5; i++) {
    out += `<svg width="14" height="14" viewBox="0 0 24 24" fill="${i<=n?'#F59E0B':'none'}" stroke="${i<=n?'#F59E0B':'var(--text-muted)'}" stroke-width="1.5"><polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.5 5.5 21 7 14 2 9.3 9 8.5"/></svg>`;
  }
  return out + '</span>';
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR') + ' ' + new Date(iso).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function renderTabs() {
  const all = Store.getReviews();
  const counts = {
    pending: all.filter(r => r.status === 'pending').length,
    approved: all.filter(r => r.status === 'approved').length,
    rejected: all.filter(r => r.status === 'rejected').length,
    all: all.length,
  };
  const tabs = [
    {id:'pending', label:'Pendentes'},
    {id:'approved', label:'Aprovadas'},
    {id:'rejected', label:'Rejeitadas'},
    {id:'all', label:'Todas'},
  ];
  document.getElementById('tabsArea').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="selectTab('${t.id}')">${t.label}<span class="cnt">${counts[t.id]}</span></button>`
  ).join('');
}

function selectTab(id) {
  activeTab = id;
  renderTabs();
  renderList();
}

function renderList() {
  const all = Store.getReviews();
  const list = activeTab === 'all' ? all : all.filter(r => r.status === activeTab);
  const area = document.getElementById('listArea');
  if (!list.length) {
    area.innerHTML = '<div class="rv-empty">Nenhuma avaliação nesta aba.</div>';
    return;
  }
  area.innerHTML = '<div class="rv-list">' + list.map(r => `
    <div class="rv-card">
      <div class="rv-top">
        <div>
          <a class="rv-prod" href="produto.html?id=${encodeURIComponent(r.product_id)}" target="_blank" rel="noopener noreferrer">${escapeHtml(productLabel(r.product_id))}</a>
          <div class="rv-meta">
            <span class="rv-name">${escapeHtml(r.customer_name || 'Cliente')}</span>
            ${starsHtml(r.rating)}
            <span class="rv-date">${fmtDate(r.created_at)}</span>
          </div>
        </div>
        <span class="rv-status ${r.status}">${r.status === 'pending' ? 'Pendente' : r.status === 'approved' ? 'Aprovada' : 'Rejeitada'}</span>
      </div>
      ${r.title ? `<div class="rv-title">${escapeHtml(r.title)}</div>` : ''}
      <div class="rv-comment">${escapeHtml(r.comment)}</div>
      ${(r.media_urls && r.media_urls.length) ? `<div class="rv-media">${r.media_urls.map(m =>
        (m.type||'').startsWith('video') ? `<video src="${m.url}" controls></video>` : `<img src="${m.url}" alt="">`
      ).join('')}</div>` : ''}
      <div class="rv-actions">
        ${r.status !== 'approved' ? `<button class="rv-btn approve" onclick="approveReview('${r.id}')">Aprovar</button>` : ''}
        ${r.status !== 'rejected' ? `<button class="rv-btn reject" onclick="rejectReview('${r.id}')">Rejeitar</button>` : ''}
        <button class="rv-btn delete" onclick="removeReview('${r.id}')">Excluir</button>
      </div>
    </div>`).join('') + '</div>';
}

function approveReview(id) { Store.updateReviewStatus(id, 'approved'); renderTabs(); renderList(); }
function rejectReview(id)  { Store.updateReviewStatus(id, 'rejected'); renderTabs(); renderList(); }
function removeReview(id) {
  if (!confirm('Excluir esta avaliação permanentemente?')) return;
  Store.deleteReview(id);
  renderTabs();
  renderList();
}

renderTabs();
renderList();
</script>
</body>
</html>
